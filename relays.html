<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 中转站 对比</title>
    <link rel="stylesheet" href="styles/shared.css">
    <style>
        /* relays.html 覆盖 shared.css 的差异值 */
        html { scroll-behavior: smooth; }
        .header .subtitle { margin-bottom: 8px; }
        .notes-section li { line-height: 1.65; }

        /* ── 区块标题 ── */
        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        /* ── 快速对比矩阵 ── */
        .matrix-section {
            margin-bottom: 48px;
        }

        .matrix-wrapper {
            overflow-x: auto;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        .matrix-filter-bar {
            margin-bottom: 14px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            background: var(--bg-secondary);
            box-shadow: var(--shadow-sm);
        }

        .matrix-filter-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
            gap: 12px;
        }

        .matrix-filter-reset {
            appearance: none;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border-radius: var(--radius-md);
            padding: 6px 10px;
            font-size: 14px;
            cursor: pointer;
        }

        .matrix-filter-reset:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.06);
        }

        .matrix-filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(84px, 1fr));
            gap: 8px 10px;
        }

        .matrix-filter-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .matrix-filter-item label {
            font-size: 14px;
            color: var(--text-tertiary);
            font-weight: 600;
        }

        .matrix-filter-item input,
        .matrix-filter-item select {
            height: 34px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 14px;
            padding: 0 10px;
        }

        .matrix-filter-item input:focus,
        .matrix-filter-item select:focus {
            outline: 2px solid rgba(99, 102, 241, 0.2);
            border-color: var(--accent-primary);
        }

        .matrix-multi {
            position: relative;
        }

        .matrix-multi-btn {
            width: 100%;
            height: 34px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 14px;
            padding: 0 10px;
            text-align: left;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .matrix-multi.open .matrix-multi-btn {
            border-color: var(--accent-primary);
            outline: 2px solid rgba(99, 102, 241, 0.2);
        }

        .matrix-multi-menu {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            width: 100%;
            max-height: 220px;
            overflow: auto;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            box-shadow: var(--shadow-md);
            z-index: 15;
            padding: 6px 0;
        }

        .matrix-multi.open .matrix-multi-menu {
            display: block;
        }

        .matrix-multi-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .matrix-multi-option:hover {
            background: var(--bg-tertiary);
        }

        .matrix-filter-result {
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .matrix-table thead th {
            background: var(--bg-tertiary);
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        .matrix-table thead th:first-child {
            background: var(--bg-tertiary);
            position: sticky;
            left: 0;
            z-index: 2;
            border-right: 1px solid var(--border-color);
            vertical-align: bottom;
        }

        .matrix-table thead th.matrix-dim-th {
            text-align: center;
            white-space: normal;
            vertical-align: bottom;
            line-height: 1.35;
        }

        .matrix-table tbody td:not(:first-child) {
            overflow-wrap: break-word;
            word-break: normal;
        }

        .platform-name {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .platform-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .platform-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            border-radius: 999px;
            outline-offset: 2px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            font-size: 12px;
            font-weight: 600;
            line-height: 1;
            padding: 7px 10px;
            white-space: nowrap;
        }

        .platform-action-btn:hover {
            color: var(--accent-primary);
            border-color: rgba(99, 102, 241, 0.32);
            background: rgba(99, 102, 241, 0.08);
        }

        .platform-action-btn .link-icon {
            flex-shrink: 0;
            color: var(--accent-primary);
            opacity: 0.75;
            transition: opacity 0.15s;
        }

        .platform-action-btn:hover .link-icon {
            opacity: 1;
        }

        .matrix-table tbody tr {
            border-bottom: 1px solid var(--border-light);
            transition: background 0.15s;
        }

        .matrix-table tbody tr:last-child {
            border-bottom: none;
        }

        .matrix-table tbody tr:hover {
            background: rgba(99, 102, 241, 0.03);
        }

        .matrix-table tbody tr:hover .platform-label {
            background: #e8eaf6;
        }

        .platform-label {
            padding: 14px 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            background: var(--bg-tertiary);
            position: sticky;
            left: 0;
            z-index: 1;
            border-right: 1px solid var(--border-color);
            transition: background 0.15s;
            vertical-align: top;
        }

        .matrix-table tbody td {
            padding: 14px 20px;
            font-size: 13px;
            color: var(--text-secondary);
            vertical-align: top;
            line-height: 1.6;
        }

        /* 星文列按星级：1～2 整格淡红底、3～4 无底色、5 整格淡绿底；说明文字默认色；星星金色 */
        .matrix-table thead th.matrix-th-star-text {
            text-align: center;
        }

        .matrix-th-help {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .matrix-help-trigger {
            appearance: none;
            border: 0;
            background: transparent;
            color: inherit;
            font: inherit;
            line-height: inherit;
            padding: 0;
            margin: 0;
            cursor: help;
            border-bottom: 1px dashed currentColor;
            border-bottom-color: currentColor;
        }

        .matrix-help-trigger:focus-visible {
            outline: 2px solid rgba(99, 102, 241, 0.45);
            outline-offset: 3px;
            border-bottom-color: currentColor;
            border-radius: 2px;
        }

        .matrix-help-trigger:hover,
        .matrix-help-trigger:focus-visible {
            color: inherit;
            border-bottom-color: currentColor;
        }

        .matrix-help-bubble {
            position: absolute;
            top: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            width: min(300px, 70vw);
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            box-shadow: var(--shadow-md);
            font-size: 12px;
            line-height: 1.55;
            font-weight: 500;
            color: var(--text-secondary);
            text-align: left;
            white-space: normal;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.16s ease;
        }

        .matrix-th-help:hover .matrix-help-bubble,
        .matrix-th-help:focus-within .matrix-help-bubble {
            opacity: 1;
            pointer-events: auto;
        }

        /* 综合评价列：整列底 + 右侧投影 + 表头强调（不 sticky） */
        .matrix-table thead th.matrix-col-rating {
            font-weight: 800;
            color: var(--accent-primary);
            border-left: 3px solid var(--accent-primary);
            border-right: 3px solid var(--accent-primary);
            background: linear-gradient(165deg, rgba(99, 102, 241, 0.28) 0%, rgba(99, 102, 241, 0.1) 45%, var(--bg-tertiary) 100%);
            box-shadow:
                inset 0 -3px 0 rgba(99, 102, 241, 0.18),
                8px 0 24px -8px rgba(15, 23, 42, 0.18);
        }

        .matrix-table tbody td.matrix-col-rating {
            border-left: 3px solid rgba(99, 102, 241, 0.55);
            border-right: 3px solid rgba(99, 102, 241, 0.45);
            background-color: rgba(99, 102, 241, 0.09);
            box-shadow: 8px 0 24px -10px rgba(15, 23, 42, 0.16);
        }

        .matrix-table tbody td.matrix-col-rating.matrix-star-tier-low {
            background-color: rgba(239, 68, 68, 0.11);
        }

        .matrix-table tbody td.matrix-col-rating.matrix-star-tier-top {
            background-color: rgba(34, 197, 94, 0.11);
        }

        .matrix-table tbody tr:hover td.matrix-col-rating {
            border-left-color: rgba(99, 102, 241, 0.75);
            border-right-color: rgba(99, 102, 241, 0.6);
            box-shadow: 8px 0 28px -8px rgba(99, 102, 241, 0.22);
        }

        .matrix-table tbody tr:hover td.matrix-col-rating.matrix-star-tier-low {
            background-color: rgba(239, 68, 68, 0.14);
        }

        .matrix-table tbody tr:hover td.matrix-col-rating.matrix-star-tier-top {
            background-color: rgba(34, 197, 94, 0.14);
        }

        .matrix-col-rating.matrix-cell-star-text .matrix-cell-stars-line .star-rating {
            font-size: 18px;
        }

        .matrix-col-rating .matrix-cell-desc-line {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .matrix-cell-star-text.matrix-star-tier-low {
            background-color: rgba(239, 68, 68, 0.07);
        }

        .matrix-cell-star-text.matrix-star-tier-top {
            background-color: rgba(34, 197, 94, 0.08);
        }

        .star-rating {
            display: inline-flex;
            align-items: center;
            font-size: 16px;
            line-height: 1;
            letter-spacing: 1px;
        }

        .star-rating .stars-on {
            color: #d9a227;
        }

        .star-rating .stars-off {
            color: var(--text-tertiary);
            opacity: 0.42;
        }

        .matrix-cell-star-text {
            vertical-align: top;
        }

        .matrix-cell-star-text .matrix-cell-stars-line {
            text-align: center;
            margin-bottom: 8px;
        }

        .matrix-cell-star-text:not(.matrix-col-rating) .matrix-cell-stars-line .star-rating {
            font-size: 14px;
        }

        .matrix-cell-desc-line {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.55;
        }

        .matrix-cell-tags {
            vertical-align: top;
        }

        .matrix-tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 8px;
            max-width: 100%;
        }

        .matrix-tag {
            display: inline-block;
            font-size: 12px;
            font-weight: 500;
            line-height: 1.35;
            padding: 4px 10px;
            border-radius: 999px;
            white-space: nowrap;
            border: 1px solid var(--border-color);
        }

        .matrix-tag--1 {
            color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.22);
        }

        .matrix-tag--2 {
            color: #0d9488;
            background: rgba(13, 148, 136, 0.08);
            border-color: rgba(13, 148, 136, 0.22);
        }

        .matrix-tag--3 {
            color: #b45309;
            background: rgba(180, 83, 9, 0.08);
            border-color: rgba(180, 83, 9, 0.2);
        }

        .protocol-tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            margin: 2px 2px 2px 0;
            white-space: nowrap;
        }

        /* ── 平台详情区 ── */
        .relays-detail-section {
            margin-bottom: 48px;
        }

        .relay-cards {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .relay-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            transition: box-shadow 0.3s;
            scroll-margin-top: 24px;
        }

        .relay-card:hover {
            box-shadow: var(--shadow-lg);
        }

        .relay-card-header {
            padding: 24px 28px 20px;
            border-bottom: 1px solid var(--border-light);
            background: linear-gradient(to right, rgba(99, 102, 241, 0.03), transparent);
        }

        .relay-card-title {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .relay-name-lg {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .relay-card-meta {
            display: inline-flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .pricing-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            transition: all 0.2s;
        }

        .pricing-link:hover {
            background: var(--bg-tertiary);
            border-color: var(--text-secondary);
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 500;
            color: var(--accent-primary);
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: var(--radius-md);
            transition: all 0.2s;
        }

        .home-link:hover {
            background: rgba(99, 102, 241, 0.08);
            border-color: var(--accent-primary);
        }

        .updated-at {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .relay-card-body {
            padding: 0 28px 28px;
        }

        .relay-section {
            padding: 20px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .relay-section:last-child {
            border-bottom: none;
        }

        .relay-section h4 {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .relay-section p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.75;
        }

        .relay-section-notes p {
            font-size: 13px;
            color: var(--text-tertiary);
            line-height: 1.7;
        }

        /* ── 模型价格子表 ── */
        .models-mini-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 4px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .models-mini-table thead th {
            background: var(--bg-tertiary);
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 1px solid var(--border-color);
        }

        .models-mini-table tbody tr {
            border-bottom: 1px solid var(--border-light);
            transition: background 0.15s;
        }

        .models-mini-table tbody tr:last-child {
            border-bottom: none;
        }

        .models-mini-table tbody tr:hover {
            background: var(--bg-tertiary);
        }

        .models-mini-table tbody td {
            padding: 11px 16px;
            font-size: 13px;
            color: var(--text-secondary);
            vertical-align: middle;
        }

        .models-mini-table tbody td:first-child {
            font-weight: 600;
            color: var(--text-primary);
        }

        .price-token {
            font-weight: 700;
            color: var(--accent-primary);
            white-space: nowrap;
        }

        .price-free {
            font-weight: 600;
            color: var(--accent-success);
        }

        .price-dash {
            color: var(--text-tertiary);
        }

        /* ── 加载动画 ── */
        .loading-state {
            text-align: center;
            padding: 80px 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* ── 滚动条 ── */
        .matrix-wrapper::-webkit-scrollbar {
            height: 6px;
        }

        .matrix-wrapper::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        .matrix-wrapper::-webkit-scrollbar-thumb {
            background: var(--text-tertiary);
            border-radius: 3px;
        }

        /* ── 响应式 ── */
        @media (max-width: 1600px) {
            body { padding: 48px 80px; }
            .container { max-width: 1280px; }
        }

        @media (max-width: 1200px) {
            body { padding: 40px 40px; }
            .container { max-width: 1100px; }
        }

        @media (max-width: 768px) {
            body { padding: 24px 16px; }
            .container { max-width: 100%; }
            .header { margin-bottom: 24px; padding: 24px 0; }
            .header h1 { font-size: 24px; }
            .header .subtitle { font-size: 14px; }
            .relay-card-body { padding: 0 16px 20px; }
            .relay-card-header { padding: 16px 16px 14px; }
            .models-mini-table { display: block; overflow-x: auto; }
        }

        @media (max-width: 480px) {
            body { padding: 16px 12px; }
            .header { padding: 16px 0; }
            .header h1 { font-size: 20px; }
            .github-link span { display: none; }
            .page-tab { padding: 8px 12px; font-size: 13px; }
        }

    </style>
</head>
<body>
    <div class="container">

        <!-- 页面导航 Tab -->
        <nav class="page-nav">
            <a href="index.html" class="page-tab">国内 Coding Plan</a>
            <a href="tools.html" class="page-tab">AI 编程工具</a>
            <a href="relays.html" class="page-tab active">API 中转站</a>
            <div class="settings-wrapper">
                <button class="settings-btn" id="settingsBtn" title="设置" aria-label="设置">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
                <div class="settings-panel" id="settingsPanel" hidden>
                    <div class="settings-panel-title">显示设置</div>
                    <div class="settings-toggle-row">
                        <label for="ultraWideToggle">超宽屏模式</label>
                        <label class="toggle-switch">
                            <input type="checkbox" id="ultraWideToggle">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 顶部标题 -->
        <div class="header">
            <a href="https://github.com/wmpeng/codingplan" target="_blank" class="github-link" id="githubLink">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                <span id="githubText">GitHub</span>
            </a>
            <h1 id="pageTitle">API 中转站</h1>
            <div class="update-date" id="updateDate">更新日期 2026.4.7</div>
            <div class="subtitle" id="subtitle">OpenRouter 等 API 中转与云推理平台，综合评价、价格、透明度、模型覆盖、可用性、国内支付与标签等维度对比</div>
        </div>

        <hr class="section-divider">

        <!-- 快速对比矩阵 -->
        <div class="matrix-section">
            <h2 class="section-title">快速对比</h2>
            <div class="matrix-filter-bar" id="matrixFilterBar"></div>
            <div class="matrix-wrapper" id="matrixWrapper">
                <div class="loading-state">加载中...</div>
            </div>
        </div>

        <hr class="section-divider">

        <!-- 平台详情区 -->
        <div class="relays-detail-section">
            <h2 class="section-title">详细介绍</h2>
            <div class="relay-cards" id="relayCards">
                <div class="loading-state">加载中...</div>
            </div>
        </div>

        <!-- 底部说明 -->
        <div class="notes-section" id="notesSection"></div>
        <div class="updates-section" id="updatesSection"></div>

    </div>

    <script>
        const RELAYS_FILE_PATH = './relays.json';
        const CONFIG_FILE_PATH = './relays-config.json';

        /** 快速对比：平台名跳转详情旁的右上箭头图标 */
        const ICON_EXTERNAL = '<svg class="link-icon link-icon--external" width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" d="M15 3h6v6"/><path stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" d="M10 14 21 3"/></svg>';
        const ICON_DOWN = '<span class="link-icon link-icon--down" aria-hidden="true">↓</span>';

        let relaysData = [];
        let pageConfig = {};
        let matrixFilterState = { platform: [], byKey: {} };
        let currentMatrixDimensions = [];
        let matrixFilterGlobalEventsBound = false;

        function getMatrixStarTextKeys() {
            return new Set(pageConfig.matrixStarTextKeys || [
                'rating', 'billingModel', 'transparency', 'modelCoverage', 'cnAccess', 'cnPayment'
            ]);
        }

        function getValueStars(val) {
            if (typeof val === 'number' && Number.isFinite(val)) return Math.round(val);
            if (val && typeof val === 'object' && !Array.isArray(val) && Number.isFinite(Number(val.stars))) {
                return Math.round(Number(val.stars));
            }
            return null;
        }

        function getValueTextForFilter(val) {
            if (val === undefined || val === null) return '';
            if (Array.isArray(val)) return val.map(v => String(v)).join(' ');
            if (typeof val === 'object') {
                const stars = getValueStars(val);
                const textPart = typeof val.text === 'string' ? val.text : '';
                return `${stars != null ? String(stars) : ''} ${textPart}`.trim();
            }
            return String(val);
        }

        function escapeHtmlPreserveBreaks(raw) {
            const normalized = String(raw).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            return escapeHtml(normalized).replace(/\n/g, '<br>');
        }

        function getMultiSelectButtonText(selectedValues, allValues) {
            const selected = Array.isArray(selectedValues) ? selectedValues : [];
            if (!selected.length) return '全部';
            if (selected.length === 1) return selected[0];
            if (selected.length === allValues.length) return '全部';
            return `已选 ${selected.length} 项`;
        }

        function renderMultiSelectControl(id, options, selectedValues, filterType, filterKey = '') {
            const selected = Array.isArray(selectedValues) ? selectedValues : [];
            const labelText = getMultiSelectButtonText(selected, options);
            const optionsHtml = options.map(opt => {
                const checked = selected.includes(opt) ? ' checked' : '';
                return `<label class="matrix-multi-option"><input type="checkbox" data-matrix-filter-type="${filterType}"${filterKey ? ` data-matrix-filter-key="${escapeHtml(filterKey)}"` : ''} value="${escapeHtml(opt)}"${checked}>${escapeHtml(opt)}</label>`;
            }).join('');
            return `
                <div class="matrix-multi" data-matrix-multi-id="${escapeHtml(id)}">
                    <button type="button" class="matrix-multi-btn" data-matrix-multi-btn>${escapeHtml(labelText)}</button>
                    <div class="matrix-multi-menu">${optionsHtml || '<div class="matrix-multi-option">暂无选项</div>'}</div>
                </div>
            `;
        }

        function renderMatrixFilterBar(dimensions) {
            const bar = document.getElementById('matrixFilterBar');
            if (!bar) return;
            if (!dimensions.length) {
                bar.innerHTML = '';
                return;
            }

            const starTextKeys = getMatrixStarTextKeys();
            const tagKeys = new Set(pageConfig.matrixTagKeys || ['tags']);
            const currentKeys = new Set(dimensions.map(d => d.key));
            const prevKeys = new Set(Object.keys(matrixFilterState.byKey || {}));
            const sameKeys = currentKeys.size === prevKeys.size && [...currentKeys].every(k => prevKeys.has(k));
            if (!sameKeys) {
                matrixFilterState = {
                    platform: [],
                    byKey: Object.fromEntries(dimensions.map(d => [d.key, tagKeys.has(d.key) ? [] : '']))
                };
            }

            const platformOptions = relaysData.map(r => String(r.name || '').trim()).filter(Boolean);
            const uniquePlatformOptions = Array.from(new Set(platformOptions));

            const dimControls = dimensions.map(dim => {
                const key = escapeHtml(dim.key);
                const label = escapeHtml(dim.label);
                const val = matrixFilterState.byKey[dim.key] || '';
                if (starTextKeys.has(dim.key)) {
                    const selected = (n) => String(val) === String(n) ? ' selected' : '';
                    return `<div class="matrix-filter-item"><label for="matrixFilter_${key}">${label}</label><select id="matrixFilter_${key}" data-matrix-filter-type="star" data-matrix-filter-key="${key}"><option value="">全部</option><option value="5"${selected(5)}>≥5 星</option><option value="4"${selected(4)}>≥4 星</option><option value="3"${selected(3)}>≥3 星</option><option value="2"${selected(2)}>≥2 星</option><option value="1"${selected(1)}>≥1 星</option></select></div>`;
                }
                if (tagKeys.has(dim.key)) {
                    const tagSet = new Set();
                    relaysData.forEach(relay => {
                        const tags = matrixTagPhrasesFromVal(relay.matrix ? relay.matrix[dim.key] : undefined);
                        tags.forEach(t => tagSet.add(t));
                    });
                    const tagOptions = Array.from(tagSet);
                    return `<div class="matrix-filter-item"><label>${label}</label>${renderMultiSelectControl(`tag_${dim.key}`, tagOptions, val, 'tag-multi', dim.key)}</div>`;
                }
                return `<div class="matrix-filter-item"><label for="matrixFilter_${key}">${label}</label><input id="matrixFilter_${key}" data-matrix-filter-type="text" data-matrix-filter-key="${key}" type="text" value="${escapeHtml(val)}" placeholder="关键词"></div>`;
            }).join('');

            bar.innerHTML = `
                <div class="matrix-filter-grid">
                    <div class="matrix-filter-item">
                        <label>平台</label>
                        ${renderMultiSelectControl('platform', uniquePlatformOptions, matrixFilterState.platform, 'platform-multi')}
                    </div>
                    ${dimControls}
                </div>
                <div class="matrix-filter-head">
                    <button type="button" class="matrix-filter-reset" id="matrixFilterResetBtn">重置筛选</button>
                    <div class="matrix-filter-result" id="matrixFilterResult"></div>
                </div>
            `;

            bar.onclick = (ev) => {
                const btn = ev.target.closest('[data-matrix-multi-btn]');
                if (btn) {
                    const box = btn.closest('.matrix-multi');
                    if (!box) return;
                    const willOpen = !box.classList.contains('open');
                    bar.querySelectorAll('.matrix-multi.open').forEach(el => el.classList.remove('open'));
                    if (willOpen) box.classList.add('open');
                    return;
                }
                if (!ev.target.closest('.matrix-multi')) {
                    bar.querySelectorAll('.matrix-multi.open').forEach(el => el.classList.remove('open'));
                }
            };

            if (!matrixFilterGlobalEventsBound) {
                document.addEventListener('click', (ev) => {
                    const currentBar = document.getElementById('matrixFilterBar');
                    if (!currentBar || currentBar.contains(ev.target)) return;
                    currentBar.querySelectorAll('.matrix-multi.open').forEach(el => el.classList.remove('open'));
                });
                matrixFilterGlobalEventsBound = true;
            }

            bar.querySelectorAll('input[data-matrix-filter-type="platform-multi"]').forEach(el => {
                el.addEventListener('change', () => {
                    const selected = [...bar.querySelectorAll('input[data-matrix-filter-type="platform-multi"]:checked')].map(x => x.value);
                    matrixFilterState.platform = selected;
                    const box = el.closest('.matrix-multi');
                    if (box) {
                        const btn = box.querySelector('[data-matrix-multi-btn]');
                        if (btn) btn.textContent = getMultiSelectButtonText(selected, uniquePlatformOptions);
                    }
                    applyMatrixFilters();
                });
            });

            bar.querySelectorAll('input[data-matrix-filter-type="tag-multi"]').forEach(el => {
                el.addEventListener('change', () => {
                    const key = el.getAttribute('data-matrix-filter-key');
                    const selected = [...bar.querySelectorAll(`input[data-matrix-filter-type="tag-multi"][data-matrix-filter-key="${key}"]:checked`)].map(x => x.value);
                    matrixFilterState.byKey[key] = selected;
                    const box = el.closest('.matrix-multi');
                    if (box) {
                        const allOptions = [...box.querySelectorAll('input[data-matrix-filter-type="tag-multi"]')].map(x => x.value);
                        const btn = box.querySelector('[data-matrix-multi-btn]');
                        if (btn) btn.textContent = getMultiSelectButtonText(selected, allOptions);
                    }
                    applyMatrixFilters();
                });
            });

            bar.querySelectorAll('[data-matrix-filter-key]').forEach(el => {
                const type = el.getAttribute('data-matrix-filter-type');
                if (type === 'tag-multi') return;
                const eventName = type === 'star' ? 'change' : 'input';
                el.addEventListener(eventName, () => {
                    const key = el.getAttribute('data-matrix-filter-key');
                    matrixFilterState.byKey[key] = el.value || '';
                    applyMatrixFilters();
                });
            });

            const resetBtn = bar.querySelector('#matrixFilterResetBtn');
            if (resetBtn) {
                resetBtn.addEventListener('click', () => {
                    const tagKeysLocal = new Set(pageConfig.matrixTagKeys || ['tags']);
                    matrixFilterState = {
                        platform: [],
                        byKey: Object.fromEntries(dimensions.map(d => [d.key, tagKeysLocal.has(d.key) ? [] : '']))
                    };
                    renderMatrixFilterBar(dimensions);
                    applyMatrixFilters();
                });
            }
        }

        function applyMatrixFilters() {
            const dimensions = currentMatrixDimensions || [];
            const starTextKeys = getMatrixStarTextKeys();
            const tagKeys = new Set(pageConfig.matrixTagKeys || ['tags']);

            const selectedPlatforms = Array.isArray(matrixFilterState.platform) ? matrixFilterState.platform : [];
            const filtered = relaysData.filter(relay => {
                if (selectedPlatforms.length && !selectedPlatforms.includes(String(relay.name || ''))) {
                    return false;
                }

                for (const dim of dimensions) {
                    const rawFilter = matrixFilterState.byKey[dim.key];
                    const filterVal = Array.isArray(rawFilter) ? rawFilter : String(rawFilter || '').trim();
                    if (!filterVal || (Array.isArray(filterVal) && !filterVal.length)) continue;

                    const cellVal = relay.matrix ? relay.matrix[dim.key] : undefined;
                    if (starTextKeys.has(dim.key)) {
                        const stars = getValueStars(cellVal);
                        const minStars = Number(String(filterVal));
                        if (!Number.isFinite(minStars) || stars == null || stars < minStars) return false;
                        continue;
                    }

                    if (tagKeys.has(dim.key)) {
                        const cellTags = matrixTagPhrasesFromVal(cellVal);
                        if (!Array.isArray(filterVal) || !filterVal.some(tag => cellTags.includes(tag))) return false;
                        continue;
                    }

                    const text = getValueTextForFilter(cellVal).toLowerCase();
                    if (!text.includes(String(filterVal).toLowerCase())) return false;
                }
                return true;
            });

            renderMatrix(filtered, dimensions);

            const resultEl = document.getElementById('matrixFilterResult');
            if (resultEl) {
                resultEl.textContent = `${filtered.length}条/共${relaysData.length}条`;
            }
        }

        /** 1–5 星 HTML；非法或缺省返回空字符串 */
        function renderStarRatingHtml(raw) {
            const n = Math.round(Number(raw));
            if (!Number.isFinite(n) || n < 1 || n > 5) return '';
            const on = '★'.repeat(n);
            const off = '☆'.repeat(5 - n);
            return `<span class="star-rating" role="img" aria-label="${n} 星，满分 5 星"><span class="stars-on" aria-hidden="true">${on}</span><span class="stars-off" aria-hidden="true">${off}</span></span>`;
        }

        /** 星文格底纹：1–2 星偏红，3–4 星无底色，5 星偏绿 */
        function matrixStarTierClass(raw) {
            const s = Math.round(Number(raw));
            if (!Number.isFinite(s) || s < 1 || s > 5) return '';
            if (s <= 2) return 'matrix-star-tier-low';
            if (s === 5) return 'matrix-star-tier-top';
            return '';
        }

        /** 标签列：字符串数组，或兼容旧数据用顿号/逗号分隔的一段文字 */
        function matrixTagPhrasesFromVal(val) {
            if (Array.isArray(val)) {
                return val.map(x => String(x).trim()).filter(Boolean);
            }
            if (typeof val === 'string' && val.trim()) {
                return val.split(/[、，,]/).map(s => s.trim()).filter(Boolean);
            }
            return [];
        }

        function matrixTagCellHtml(phrases) {
            if (!phrases.length) {
                return `<td class="matrix-cell-tags"><span class="price-dash">—</span></td>`;
            }
            const inner = phrases.map((t, i) => {
                const variant = (i % 3) + 1;
                return `<span class="matrix-tag matrix-tag--${variant}">${escapeHtml(t)}</span>`;
            }).join('');
            return `<td class="matrix-cell-tags"><div class="matrix-tag-list">${inner}</div></td>`;
        }

        // ── 渲染矩阵 ──
        function renderMatrix(relays, dimensions) {
            const wrapper = document.getElementById('matrixWrapper');
            if (!relays.length || !dimensions.length) {
                wrapper.innerHTML = '<div class="loading-state">暂无数据</div>';
                return;
            }

            const starTextKeys = getMatrixStarTextKeys();
            const tagKeys = new Set(pageConfig.matrixTagKeys || ['tags']);

            function matrixCellTd(val, dimKey) {
                const ratingCol = dimKey === 'rating' ? ' matrix-col-rating' : '';

                if (tagKeys.has(dimKey)) {
                    const tagCell = matrixTagCellHtml(matrixTagPhrasesFromVal(val));
                    if (ratingCol) return tagCell.replace('class="matrix-cell-tags"', 'class="matrix-cell-tags matrix-col-rating"');
                    return tagCell;
                }
                if (starTextKeys.has(dimKey)) {
                    let v = val;
                    if (typeof v === 'number' && Number.isFinite(v)) {
                        v = { stars: Math.round(v), text: '' };
                    }
                    if (v && typeof v === 'object' && !Array.isArray(v) && ('stars' in v || 'text' in v)) {
                        const tier = matrixStarTierClass(v.stars);
                        const starsHtml = renderStarRatingHtml(v.stars) || '<span class="price-dash">—</span>';
                        const t = v.text != null ? String(v.text) : '';
                        const textHtml = t ? escapeHtmlPreserveBreaks(t) : '<span class="price-dash">—</span>';
                        const cls = ['matrix-cell-star-text', tier || null, ratingCol.trim()].filter(Boolean).join(' ');
                        return `<td class="${cls}"><div class="matrix-cell-stars-line">${starsHtml}</div><div class="matrix-cell-desc-line">${textHtml}</div></td>`;
                    }
                    if (typeof v === 'string' && v !== '') {
                        return `<td class="matrix-cell-star-text${ratingCol}"><div class="matrix-cell-stars-line"><span class="price-dash">—</span></div><div class="matrix-cell-desc-line">${escapeHtmlPreserveBreaks(v)}</div></td>`;
                    }
                    return `<td class="matrix-cell-star-text${ratingCol}"><span class="price-dash">—</span></td>`;
                }
                if (Array.isArray(val)) {
                    const tags = val.map(v => `<span class="protocol-tag">${escapeHtml(v)}</span>`).join('');
                    return `<td${ratingCol ? ` class="${ratingCol.trim()}"` : ''}>${tags}</td>`;
                }
                if (val === undefined || val === null || val === '') {
                    return `<td${ratingCol ? ` class="${ratingCol.trim()}"` : ''}><span class="price-dash">—</span></td>`;
                }
                const strVal = String(val);
                return `<td${ratingCol ? ` class="${ratingCol.trim()}"` : ''}>${escapeHtmlPreserveBreaks(strVal)}</td>`;
            }

            const PLATFORM_W = 140;
            const TAG_W = 140;
            const DIM_MIN = 200;
            const RATING_WEIGHT = 1.5;
            const flexibleDimensions = dimensions.filter(d => d.key !== 'tags');
            const totalWeight = flexibleDimensions.reduce((s, d) => s + (d.key === 'rating' ? RATING_WEIGHT : 1), 0);
            const minTableW = Math.max(640, PLATFORM_W + TAG_W + DIM_MIN * totalWeight);

            const theadDimCols = dimensions.map(dim => {
                const thExtra = starTextKeys.has(dim.key) ? ' matrix-th-star-text' : '';
                const ratingTh = dim.key === 'rating' ? ' matrix-col-rating' : '';
                if (dim.key === 'tags') {
                    return `<th class="matrix-dim-th${thExtra}${ratingTh}" style="width:${TAG_W}px;min-width:${TAG_W}px;max-width:${TAG_W}px">${escapeHtml(dim.label)}</th>`;
                }
                const w = dim.key === 'rating' ? RATING_WEIGHT : 1;
                const dimPx = Math.round(DIM_MIN * w);
                const helpText = typeof dim.helpText === 'string' ? dim.helpText.trim() : '';
                if (helpText) {
                    return `<th class="matrix-dim-th${thExtra}${ratingTh}" style="width:${dimPx}px;min-width:${dimPx}px;max-width:${dimPx}px"><span class="matrix-th-help"><button type="button" class="matrix-help-trigger" aria-label="${escapeHtml(dim.label)}说明">${escapeHtml(dim.label)}</button><span class="matrix-help-bubble" role="tooltip">${escapeHtml(helpText)}</span></span></th>`;
                }
                return `<th class="matrix-dim-th${thExtra}${ratingTh}" style="width:${dimPx}px;min-width:${dimPx}px;max-width:${dimPx}px">${escapeHtml(dim.label)}</th>`;
            }).join('');

            const tbody = relays.map(r => {
                const cells = dimensions.map(dim => {
                    const val = r.matrix ? r.matrix[dim.key] : undefined;
                    return matrixCellTd(val, dim.key);
                }).join('');
                return `<tr>
                    <td class="platform-label">
                        <span class="platform-name">${escapeHtml(r.name)}</span>
                        <div class="platform-actions">
                            ${r.homeUrl ? `<a class="platform-action-btn" href="${escapeHtml(r.homeUrl)}" target="_blank" rel="noopener noreferrer" title="打开官网">官网${ICON_EXTERNAL}</a>` : ''}
                            <a class="platform-action-btn" href="#relay-${escapeHtml(r.id)}" title="跳转至下方详细介绍">查看详情${ICON_DOWN}</a>
                        </div>
                    </td>
                    ${cells}
                </tr>`;
            }).join('');

            wrapper.innerHTML = `
                <table class="matrix-table" style="width:${minTableW}px;min-width:${minTableW}px">
                    <thead>
                        <tr>
                            <th style="width:${PLATFORM_W}px;min-width:${PLATFORM_W}px;max-width:${PLATFORM_W}px">平台</th>
                            ${theadDimCols}
                        </tr>
                    </thead>
                    <tbody>${tbody}</tbody>
                </table>
            `;
        }

        // ── 渲染平台详情卡片 ──
        function renderRelayCards(relays) {
            const container = document.getElementById('relayCards');
            if (!relays.length) {
                container.innerHTML = '<div class="loading-state">暂无数据</div>';
                return;
            }

            container.innerHTML = relays.map(relay => {
                const detail = relay.detail || {};

                const modelsRows = (detail.keyModels || []).map(m => {
                    const inputCell = m.inputPer1M === '$0.00'
                        ? `<td><span class="price-free">免费</span></td>`
                        : `<td><span class="price-token">${escapeHtml(m.inputPer1M)}</span></td>`;
                    const outputCell = m.outputPer1M === '$0.00'
                        ? `<td><span class="price-free">免费</span></td>`
                        : `<td><span class="price-token">${escapeHtml(m.outputPer1M)}</span></td>`;
                    return `
                        <tr>
                            <td>${escapeHtml(m.name)}</td>
                            ${inputCell}
                            ${outputCell}
                            <td>${escapeHtml(m.note || '')}</td>
                        </tr>
                    `;
                }).join('');

                const modelsSection = modelsRows ? `
                    <div class="relay-section">
                        <h4>代表模型定价（部分示例）</h4>
                        <table class="models-mini-table">
                            <thead>
                                <tr>
                                    <th>模型</th>
                                    <th>输入 / 1M tokens</th>
                                    <th>输出 / 1M tokens</th>
                                    <th>备注</th>
                                </tr>
                            </thead>
                            <tbody>${modelsRows}</tbody>
                        </table>
                    </div>
                ` : '';

                const notesSection = detail.notes ? `
                    <div class="relay-section relay-section-notes">
                        <h4>注意事项</h4>
                        <p>${escapeHtml(detail.notes)}</p>
                    </div>
                ` : '';

                return `
                    <div class="relay-card" id="relay-${escapeHtml(relay.id)}">
                        <div class="relay-card-header">
                            <div class="relay-card-title">
                                <span class="relay-name-lg">${escapeHtml(relay.name)}</span>
                                <span class="relay-card-meta">
                                    ${relay.homeUrl ? `<a href="${escapeHtml(relay.homeUrl)}" target="_blank" class="home-link">官网 →</a>` : ''}
                                    <a href="${escapeHtml(relay.pricingUrl)}" target="_blank" class="pricing-link">查看定价 →</a>
                                    <span class="updated-at">数据更新：${escapeHtml(relay.updatedAt)}</span>
                                </span>
                            </div>
                        </div>
                        <div class="relay-card-body">
                            ${detail.description ? `
                                <div class="relay-section">
                                    <h4>产品简介</h4>
                                    <p>${escapeHtml(detail.description)}</p>
                                </div>
                            ` : ''}
                            ${detail.billingRules ? `
                                <div class="relay-section">
                                    <h4>计费规则</h4>
                                    <p>${escapeHtml(detail.billingRules)}</p>
                                </div>
                            ` : ''}
                            ${detail.networkAndPayment ? `
                                <div class="relay-section">
                                    <h4>网络与支付</h4>
                                    <p>${escapeHtml(detail.networkAndPayment)}</p>
                                </div>
                            ` : ''}
                            ${modelsSection}
                            ${notesSection}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ── 渲染底部说明 ──
        function renderNotes(notes) {
            if (!notes || !notes.length) return;
            document.getElementById('notesSection').innerHTML = `
                <h3>说明</h3>
                <ul>${notes.map(n => `<li>${escapeHtml(n)}</li>`).join('')}</ul>
            `;
        }

        // ── 渲染更新日志 ──
        function renderUpdates(updates) {
            if (!updates || !updates.length) return;
            const items = updates.map(u => `
                <li class="update-item">
                    <div class="log-date">${escapeHtml(u.date)}</div>
                    <ul class="update-items">
                        ${u.items.map(i => `<li>${escapeHtml(i)}</li>`).join('')}
                    </ul>
                </li>
            `).join('');
            document.getElementById('updatesSection').innerHTML = `
                <h3>更新日志</h3>
                <ul class="updates-list">${items}</ul>
            `;
        }

        // ── 应用配置 ──
        function applyConfig(config) {
            if (config.header) {
                const h = config.header;
                document.title = `${h.title} 对比`;
                document.getElementById('pageTitle').textContent = h.title;
                document.getElementById('updateDate').textContent = h.updateDate;
                document.getElementById('subtitle').textContent = h.subtitle;
                if (h.github) {
                    document.getElementById('githubLink').href = h.github.url;
                    document.getElementById('githubText').textContent = h.github.text;
                }
            }
            renderNotes(config.notes);
            renderUpdates(config.updates);
        }

        // ── 加载配置 ──
        async function loadConfig() {
            try {
                const res = await fetch(CONFIG_FILE_PATH, { cache: 'no-store' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                pageConfig = await res.json();
                applyConfig(pageConfig);
            } catch (e) {
                console.error('加载配置失败:', e);
            }
        }

        // ── 加载数据 ──
        async function loadRelays() {
            try {
                const res = await fetch(RELAYS_FILE_PATH, { cache: 'no-store' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                relaysData = await res.json();

                const dimensions = (pageConfig.matrixDimensions) || [];
                currentMatrixDimensions = dimensions;
                renderMatrixFilterBar(dimensions);
                applyMatrixFilters();
                renderRelayCards(relaysData);

                console.log(`成功加载 ${relaysData.length} 个中转站数据`);
            } catch (e) {
                console.error('加载数据失败:', e);
                document.getElementById('matrixWrapper').innerHTML =
                    '<div class="loading-state">数据加载失败，请检查 relays.json 文件</div>';
                document.getElementById('relayCards').innerHTML =
                    '<div class="loading-state">数据加载失败，请检查 relays.json 文件</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadConfig();
            await loadRelays();
        });

    </script>
    <script src="scripts/shared.js"></script>
</body>
</html>
