<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 中转站 对比</title>
    <link rel="stylesheet" href="styles/shared.css">
    <style>
        /* relays.html 覆盖 shared.css 的差异值 */
        html { scroll-behavior: smooth; }
        .header .subtitle { margin-bottom: 8px; }
        .header-info {
            width: min(760px, 100%);
            margin: 42px auto 0;
            padding: 12px 14px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            background: rgba(255, 255, 255, 0.62);
            color: var(--text-tertiary);
            font-size: 13px;
            line-height: 1.75;
            text-align: left;
            box-shadow: var(--shadow-sm);
        }
        .notes-section li { line-height: 1.65; }

        /* ── 区块标题 ── */
        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        /* ── 快速对比矩阵 ── */
        .matrix-section {
            margin-bottom: 48px;
        }

        .matrix-wrapper {
            overflow-x: auto;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        .matrix-filter-bar {
            margin-bottom: 14px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            background: var(--bg-secondary);
            box-shadow: var(--shadow-sm);
        }

        .matrix-filter-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
            gap: 12px;
        }

        .matrix-filter-head-actions {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .matrix-filter-check {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .matrix-filter-check input {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-primary);
            cursor: pointer;
        }

        .matrix-filter-reset {
            appearance: none;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border-radius: var(--radius-md);
            padding: 6px 10px;
            font-size: 14px;
            cursor: pointer;
        }

        .matrix-filter-reset:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.06);
        }

        .matrix-filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(84px, 1fr));
            gap: 8px 10px;
        }

        .matrix-filter-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .matrix-filter-item label {
            font-size: 14px;
            color: var(--text-tertiary);
            font-weight: 600;
        }

        .matrix-filter-item input,
        .matrix-filter-item select {
            height: 34px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 14px;
            padding: 0 10px;
        }

        .matrix-filter-item input:focus,
        .matrix-filter-item select:focus {
            outline: 2px solid rgba(99, 102, 241, 0.2);
            border-color: var(--accent-primary);
        }

        .matrix-multi {
            position: relative;
        }

        .matrix-multi-btn {
            width: 100%;
            height: 34px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 14px;
            padding: 0 10px;
            text-align: left;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .matrix-multi.open .matrix-multi-btn {
            border-color: var(--accent-primary);
            outline: 2px solid rgba(99, 102, 241, 0.2);
        }

        .matrix-multi-menu {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            width: 100%;
            max-height: 220px;
            overflow: auto;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            box-shadow: var(--shadow-md);
            z-index: 15;
            padding: 6px 0;
        }

        .matrix-multi.open .matrix-multi-menu {
            display: block;
        }

        .matrix-multi-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .matrix-multi-option:hover {
            background: var(--bg-tertiary);
        }

        .matrix-filter-result {
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .matrix-filter-item--slider {
            grid-column: span 2;
        }

        .price-slider-container {
            padding: 0 20px;
        }

        .price-slider {
            position: relative;
            height: 24px;
            margin: 0 0;
            padding: 0 80px;
            box-sizing: border-box;
        }

        .slider-track {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 6px;
            background: #e2e8f0;
            border-radius: 4px;
            transform: translateY(-50%);
        }

        .slider-range {
            position: absolute;
            top: 50%;
            height: 6px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 4px;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .slider-thumb {
            position: absolute;
            top: 50%;
            width: 18px;
            height: 18px;
            background: white;
            border: 2px solid #6366f1;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            z-index: 10;
        }

        .slider-thumb:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }

        .slider-thumb:active {
            cursor: grabbing;
            transform: translate(-50%, -50%) scale(1.1);
        }

        .slider-values {
            display: flex;
            justify-content: space-between;
            margin-top: 0;
        }

        .slider-value {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .section-info {
            margin: -6px 0 14px;
            font-size: 13px;
            color: var(--text-tertiary);
            line-height: 1.7;
        }

        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .matrix-table thead th {
            background: var(--bg-tertiary);
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        .matrix-table thead th:first-child {
            background: var(--bg-tertiary);
            position: sticky;
            left: 0;
            z-index: 2;
            border-right: 1px solid var(--border-color);
            vertical-align: bottom;
        }

        .matrix-table thead th.matrix-dim-th {
            text-align: center;
            white-space: normal;
            vertical-align: bottom;
            line-height: 1.35;
        }

        .matrix-table thead th.matrix-sortable {
            position: relative;
            cursor: pointer;
            user-select: none;
        }

        .matrix-table thead th.matrix-sortable::after {
            content: '';
            display: inline-block;
            width: 0;
            height: 0;
            margin-left: 8px;
            vertical-align: middle;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 4px solid var(--text-tertiary);
            opacity: 0.4;
            transition: all 0.2s;
        }

        .matrix-table thead th.matrix-sort-asc::after {
            border-top: none;
            border-bottom: 4px solid var(--accent-primary);
            opacity: 1;
        }

        .matrix-table thead th.matrix-sort-desc::after {
            border-top: 4px solid var(--accent-primary);
            border-bottom: none;
            opacity: 1;
        }

        .matrix-table tbody td:not(:first-child) {
            overflow-wrap: break-word;
            word-break: normal;
        }

        .platform-name {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .platform-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .platform-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            border-radius: 999px;
            outline-offset: 2px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            font-size: 12px;
            font-weight: 600;
            line-height: 1;
            padding: 7px 10px;
            white-space: nowrap;
        }

        .platform-action-btn:hover {
            color: var(--accent-primary);
            border-color: rgba(99, 102, 241, 0.32);
            background: rgba(99, 102, 241, 0.08);
        }

        .platform-action-btn .link-icon {
            flex-shrink: 0;
            color: var(--accent-primary);
            opacity: 0.75;
            transition: opacity 0.15s;
        }

        .platform-action-btn:hover .link-icon {
            opacity: 1;
        }

        .matrix-table tbody tr {
            border-bottom: 1px solid var(--border-light);
            transition: background 0.15s;
        }

        .matrix-table tbody tr:last-child {
            border-bottom: none;
        }

        .matrix-table tbody tr:hover {
            background: rgba(99, 102, 241, 0.03);
        }

        .matrix-table tbody tr:hover .platform-label {
            background: #e8eaf6;
        }

        .platform-label {
            padding: 14px 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            background: var(--bg-tertiary);
            position: sticky;
            left: 0;
            z-index: 1;
            border-right: 1px solid var(--border-color);
            transition: background 0.15s;
            vertical-align: top;
        }

        .matrix-table tbody td {
            padding: 14px 20px;
            font-size: 13px;
            color: var(--text-secondary);
            vertical-align: top;
            line-height: 1.6;
        }

        /* 星文列按星级：1～2 整格淡红底、3～4 无底色、5 整格淡绿底；说明文字默认色；星星金色 */
        .matrix-table thead th.matrix-th-star-text {
            text-align: center;
        }

        .matrix-th-help {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .matrix-help-trigger {
            appearance: none;
            border: 0;
            background: transparent;
            color: inherit;
            font: inherit;
            line-height: inherit;
            padding: 0;
            margin: 0;
            cursor: help;
            border-bottom: 1px dashed currentColor;
            border-bottom-color: currentColor;
        }

        .matrix-help-trigger:focus-visible {
            outline: 2px solid rgba(99, 102, 241, 0.45);
            outline-offset: 3px;
            border-bottom-color: currentColor;
            border-radius: 2px;
        }

        .matrix-help-trigger:hover,
        .matrix-help-trigger:focus-visible {
            color: inherit;
            border-bottom-color: currentColor;
        }

        .matrix-help-bubble {
            position: absolute;
            top: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            width: min(300px, 70vw);
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            box-shadow: var(--shadow-md);
            font-size: 12px;
            line-height: 1.55;
            font-weight: 500;
            color: var(--text-secondary);
            text-align: left;
            white-space: normal;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.16s ease;
        }

        .matrix-th-help:hover .matrix-help-bubble,
        .matrix-th-help:focus-within .matrix-help-bubble {
            opacity: 1;
            pointer-events: auto;
        }

        /* 综合评价列：整列底 + 右侧投影 + 表头强调（不 sticky） */
        .matrix-table thead th.matrix-col-rating {
            font-weight: 800;
            color: var(--accent-primary);
            border-left: 3px solid var(--accent-primary);
            border-right: 3px solid var(--accent-primary);
            background: linear-gradient(165deg, rgba(99, 102, 241, 0.28) 0%, rgba(99, 102, 241, 0.1) 45%, var(--bg-tertiary) 100%);
            box-shadow:
                inset 0 -3px 0 rgba(99, 102, 241, 0.18),
                8px 0 24px -8px rgba(15, 23, 42, 0.18);
        }

        .matrix-table tbody td.matrix-col-rating {
            border-left: 3px solid rgba(99, 102, 241, 0.55);
            border-right: 3px solid rgba(99, 102, 241, 0.45);
            background-color: rgba(99, 102, 241, 0.09);
            box-shadow: 8px 0 24px -10px rgba(15, 23, 42, 0.16);
        }

        .matrix-table tbody td.matrix-col-rating.matrix-star-tier-low {
            background-color: rgba(239, 68, 68, 0.11);
        }

        .matrix-table tbody td.matrix-col-rating.matrix-star-tier-top {
            background-color: rgba(34, 197, 94, 0.11);
        }

        .matrix-table tbody tr:hover td.matrix-col-rating {
            border-left-color: rgba(99, 102, 241, 0.75);
            border-right-color: rgba(99, 102, 241, 0.6);
            box-shadow: 8px 0 28px -8px rgba(99, 102, 241, 0.22);
        }

        .matrix-table tbody tr:hover td.matrix-col-rating.matrix-star-tier-low {
            background-color: rgba(239, 68, 68, 0.14);
        }

        .matrix-table tbody tr:hover td.matrix-col-rating.matrix-star-tier-top {
            background-color: rgba(34, 197, 94, 0.14);
        }

        .matrix-col-rating.matrix-cell-star-text .matrix-cell-stars-line .star-rating {
            font-size: 18px;
        }

        .matrix-col-rating .matrix-cell-desc-line {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .matrix-cell-star-text.matrix-star-tier-low {
            background-color: rgba(239, 68, 68, 0.07);
        }

        .matrix-cell-star-text.matrix-star-tier-top {
            background-color: rgba(34, 197, 94, 0.08);
        }

        .star-rating {
            display: inline-flex;
            align-items: center;
            font-size: 16px;
            line-height: 1;
            letter-spacing: 1px;
        }

        .star-rating .stars-on {
            color: #d9a227;
        }

        .star-rating .stars-off {
            color: var(--text-tertiary);
            opacity: 0.42;
        }

        .matrix-cell-star-text {
            vertical-align: top;
        }

        .matrix-cell-star-text .matrix-cell-stars-line {
            text-align: center;
            margin-bottom: 8px;
        }

        .matrix-cell-star-text:not(.matrix-col-rating) .matrix-cell-stars-line .star-rating {
            font-size: 14px;
        }

        .matrix-cell-desc-line {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.55;
        }

        .matrix-cell-tags {
            vertical-align: top;
        }

        .matrix-tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 8px;
            max-width: 100%;
        }

        .matrix-tag {
            display: inline-block;
            font-size: 12px;
            font-weight: 500;
            line-height: 1.35;
            padding: 4px 10px;
            border-radius: 999px;
            white-space: nowrap;
            border: 1px solid var(--border-color);
        }

        .matrix-tag--1 {
            color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.22);
        }

        .matrix-tag--2 {
            color: #0d9488;
            background: rgba(13, 148, 136, 0.08);
            border-color: rgba(13, 148, 136, 0.22);
        }

        .matrix-tag--3 {
            color: #b45309;
            background: rgba(180, 83, 9, 0.08);
            border-color: rgba(180, 83, 9, 0.2);
        }

        .protocol-tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            margin: 2px 2px 2px 0;
            white-space: nowrap;
        }

        /* ── 平台详情区 ── */
        .relays-detail-section {
            margin-bottom: 48px;
        }

        .relay-cards {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .relay-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            transition: box-shadow 0.3s;
            scroll-margin-top: 24px;
        }

        .relay-card:hover {
            box-shadow: var(--shadow-lg);
        }

        .relay-card-header {
            padding: 24px 28px 20px;
            border-bottom: 1px solid var(--border-light);
            background: linear-gradient(to right, rgba(99, 102, 241, 0.03), transparent);
        }

        .relay-card-title {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .relay-name-lg {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .relay-card-meta {
            display: inline-flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .pricing-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            transition: all 0.2s;
        }

        .pricing-link:hover {
            background: var(--bg-tertiary);
            border-color: var(--text-secondary);
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 500;
            color: var(--accent-primary);
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: var(--radius-md);
            transition: all 0.2s;
        }

        .home-link:hover {
            background: rgba(99, 102, 241, 0.08);
            border-color: var(--accent-primary);
        }

        .updated-at {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .relay-card-body {
            padding: 0 28px 28px;
        }

        .relay-section {
            padding: 20px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .relay-section:last-child {
            border-bottom: none;
        }

        .relay-section h4 {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .relay-section p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.75;
        }

        .relay-section-notes p {
            font-size: 13px;
            color: var(--text-tertiary);
            line-height: 1.7;
        }

        /* ── 模型价格子表 ── */
        .models-mini-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 4px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .models-mini-table thead th {
            background: var(--bg-tertiary);
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 1px solid var(--border-color);
        }

        .models-mini-table tbody tr {
            border-bottom: 1px solid var(--border-light);
            transition: background 0.15s;
        }

        .models-mini-table tbody tr:last-child {
            border-bottom: none;
        }

        .models-mini-table tbody tr:hover {
            background: var(--bg-tertiary);
        }

        .models-mini-table tbody td {
            padding: 11px 16px;
            font-size: 13px;
            color: var(--text-secondary);
            vertical-align: middle;
        }

        .models-mini-table tbody td:first-child {
            font-weight: 600;
            color: var(--text-primary);
        }

        .price-token {
            font-weight: 700;
            color: var(--accent-primary);
            white-space: nowrap;
        }

        .price-free {
            font-weight: 600;
            color: var(--accent-success);
        }

        .price-dash {
            color: var(--text-tertiary);
        }

        /* ── 模型价格矩阵 ── */
        .model-matrix-section {
            margin-bottom: 48px;
        }

        .model-matrix-table tbody tr:hover .model-label {
            background: #e8eaf6;
        }

        .model-label {
            padding: 14px 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            background: var(--bg-tertiary);
            position: sticky;
            left: 0;
            z-index: 1;
            border-right: 1px solid var(--border-color);
            transition: background 0.15s;
            vertical-align: top;
        }

        .model-name {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
            margin-bottom: 6px;
        }

        .model-meta {
            display: block;
            font-size: 12px;
            color: var(--text-tertiary);
            line-height: 1.5;
        }

        .model-summary-cell {
            vertical-align: top;
        }

        .model-summary-main {
            font-size: 14px;
            font-weight: 700;

    <script>
        const RELAYS_FILE_PATH = './relays.json';
        const CONFIG_FILE_PATH = './relays-config.json';

        /** 快速对比：平台名跳转详情旁的右上箭头图标 */
        const ICON_EXTERNAL = '<svg class="link-icon link-icon--external" width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" d="M15 3h6v6"/><path stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" d="M10 14 21 3"/></svg>';
        const ICON_DOWN = '<span class="link-icon link-icon--down" aria-hidden="true">↓</span>';

        let relaysData = [];
        let modelMatrixData = [];
        let pageConfig = {};
        let matrixFilterState = { platform: [], byKey: {} };
        let currentMatrixDimensions = [];
        let matrixFilterGlobalEventsBound = false;
        let matrixResizeObserver = null;
        let matrixRelayoutFrame = 0;
        let lastMatrixWrapperWidth = 0;
        let matrixSortState = { key: null, direction: 'asc' };
        let modelMatrixFilterState = {
            relay: [],
            model: [],
            inputMin: '',
            inputMax: '',
            outputMin: '',
            outputMax: '',
            cheapestOnly: true
        };
        let modelMatrixSortState = { key: null, direction: 'asc' };
        let modelMatrixResizeObserver = null;
        let modelMatrixRelayoutFrame = 0;
        let lastModelMatrixWrapperWidth = 0;
        const modelPriceSliderIdPrefix = {
            input: 'modelInputPrice',
            output: 'modelOutputPrice'
        };
        const modelPriceSliders = {
            input: { min: null, max: null, minValue: 0, maxValue: 1 },
            output: { min: null, max: null, minValue: 0, maxValue: 1 }
        };

        function getMatrixDimensionValueType(dim) {
            const rawType = dim && typeof dim.valueType === 'string' ? dim.valueType.trim() : '';
            return rawType || 'text';
        }

        function isMatrixStarTextDimension(dim) {
            return getMatrixDimensionValueType(dim) === 'starText';
        }

        function isMatrixTagDimension(dim) {
            return getMatrixDimensionValueType(dim) === 'tags';
        }

        function getMatrixFilterDefaultValue(dim) {
            return isMatrixTagDimension(dim) ? [] : '';
        }

        function normalizeMatrixDimensions(rawDimensions) {
            if (!Array.isArray(rawDimensions)) return [];

            const seenKeys = new Set();
            const normalized = [];

            rawDimensions.forEach((dim, index) => {
                if (!dim || typeof dim !== 'object') {
                    console.warn(`matrixDimensions[${index}] 无效，已忽略`);
                    return;
                }

                const key = String(dim.key || '').trim();
                if (!key) {
                    console.warn(`matrixDimensions[${index}] 缺少 key，已忽略`);
                    return;
                }
                if (seenKeys.has(key)) {
                    console.warn(`matrixDimensions 中存在重复 key: ${key}，后续项已忽略`);
                    return;
                }

                seenKeys.add(key);
                normalized.push({
                    ...dim,
                    key,
                    label: typeof dim.label === 'string' && dim.label.trim() ? dim.label.trim() : key,
                    valueType: getMatrixDimensionValueType(dim)
                });
            });

            return normalized;
        }

        function getValueStars(val) {
            if (typeof val === 'number' && Number.isFinite(val)) return Math.round(val);
            if (val && typeof val === 'object' && !Array.isArray(val) && Number.isFinite(Number(val.stars))) {
                return Math.round(Number(val.stars));
            }
            return null;
        }

        function getValueTextForFilter(val) {
            if (val === undefined || val === null) return '';
            if (Array.isArray(val)) return val.map(v => String(v)).join(' ');
            if (typeof val === 'object') {
                const stars = getValueStars(val);
                const textPart = typeof val.text === 'string' ? val.text : '';
                return `${stars != null ? String(stars) : ''} ${textPart}`.trim();
            }
            return String(val);
        }

        function escapeHtmlPreserveBreaks(raw) {
            const normalized = String(raw).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            return escapeHtml(normalized).replace(/\n/g, '<br>');
        }

        function parsePriceValue(raw) {
            const text = String(raw || '').trim();
            if (!text) {
                return { raw: '', amount: null, currency: '' };
            }

            if (text === '免费' || text === '$0.00' || text === '￥0.00') {
                const currency = text.startsWith('￥') ? '￥' : (text.startsWith('$') ? '$' : '');
                return { raw: text, amount: 0, currency };
            }

            const match = text.match(/^([￥$])\s*([0-9]+(?:\.[0-9]+)?)/);
            if (!match) {
                return { raw: text, amount: null, currency: '' };
            }

            const amount = Number(match[2]);
            return {
                raw: text,
                amount: Number.isFinite(amount) ? amount : null,
                currency: match[1] || ''
            };
        }

        function getModelPriceExchangeConfig() {
            const config = pageConfig && typeof pageConfig.modelPriceExchange === 'object'
                ? pageConfig.modelPriceExchange
                : {};
            const rates = config && typeof config.rates === 'object' ? config.rates : {};

            return {
                baseCurrency: String(config.baseCurrency || 'CNY').trim() || 'CNY',
                rates: {
                    '￥': Number.isFinite(Number(rates['￥'])) ? Number(rates['￥']) : 1,
                    '$': Number.isFinite(Number(rates['$'])) ? Number(rates['$']) : 7
                }
            };
        }

        function normalizeModelPrice(amount, currency) {
            if (!Number.isFinite(amount)) return null;
            const exchangeConfig = getModelPriceExchangeConfig();
            const rate = exchangeConfig.rates[String(currency || '').trim()];
            if (!Number.isFinite(rate)) return null;
            return amount * rate;
        }

        const missingRelayPageTextKeys = new Set();

        function getRelayPageText(path) {
            const parts = String(path || '').split('.').filter(Boolean);
            let current = pageConfig;

            for (const part of parts) {
                if (!current || typeof current !== 'object' || !(part in current)) {
                    if (!missingRelayPageTextKeys.has(path)) {
                        missingRelayPageTextKeys.add(path);
                        console.error(`relays-config.json 缺少文案字段: ${path}`);
                    }
                    return String(path || '');
                }
                current = current[part];
            }

            if (typeof current === 'string' && current.trim()) {
                return current;
            }

            if (!missingRelayPageTextKeys.has(path)) {
                missingRelayPageTextKeys.add(path);
                console.error(`relays-config.json 文案字段为空: ${path}`);
            }
            return String(path || '');
        }

        function getModelGroupLabel(model) {
            const raw = String(model && model.group || '').trim();
            return raw || '-';
        }

        function buildModelMatrixData(relays) {
            const rows = [];

            relays.forEach(relay => {
                const relayModels = Array.isArray(relay.detail && relay.detail.keyModels) ? relay.detail.keyModels : [];
                relayModels.forEach(model => {
                    const modelName = String(model && model.name || '').trim();
                    if (!modelName) return;

                    const input = parsePriceValue(model.inputPer1M);
                    const output = parsePriceValue(model.outputPer1M);
                    rows.push({
                        name: modelName,
                        group: getModelGroupLabel(model),
                        relayId: relay.id,
                        relayName: relay.name,
                        inputRaw: input.raw,
                        inputValue: input.amount,
                        inputCurrency: input.currency,
                        inputNormalizedValue: normalizeModelPrice(input.amount, input.currency),
                        outputRaw: output.raw,
                        outputValue: output.amount,
                        outputCurrency: output.currency,
                        outputNormalizedValue: normalizeModelPrice(output.amount, output.currency),
                        note: String(model.note || '').trim(),
                        __modelMatrixOriginalIndex: rows.length
                    });
                });
            });

            return rows;
        }

        function getModelPriceValues(kind) {
            const valueKey = kind === 'output' ? 'outputNormalizedValue' : 'inputNormalizedValue';
            return modelMatrixData.map(row => row[valueKey]).filter(v => Number.isFinite(v));
        }

        function getModelPriceBounds(kind) {
            const values = getModelPriceValues(kind);
            if (!values.length) return { min: 0, max: 1 };

            const min = Math.floor(Math.min(...values) * 100) / 100;
            let max = Math.ceil(Math.max(...values) * 100) / 100;
            if (max <= min) {
                max = min + 1;
            }
            return { min, max };
        }

        function formatModelSliderPrice(value) {
            if (!Number.isFinite(value)) return '￥0';
            const rounded = Math.round(value * 100) / 100;
            const text = Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(2).replace(/0+$/, '').replace(/\.$/, '');
            return `￥${text}`;
        }

        function initModelPriceSlider(kind) {
            const prefix = modelPriceSliderIdPrefix[kind];
            if (!prefix) return;

            const bounds = getModelPriceBounds(kind);
            const slider = modelPriceSliders[kind];
            slider.minValue = bounds.min;
            slider.maxValue = bounds.max;

            const filterMin = kind === 'input' ? modelMatrixFilterState.inputMin : modelMatrixFilterState.outputMin;
            const filterMax = kind === 'input' ? modelMatrixFilterState.inputMax : modelMatrixFilterState.outputMax;
            const hasActiveFilter = filterMin !== '' && filterMax !== '';

            const currentMin = hasActiveFilter && Number.isFinite(Number(filterMin))
                ? Math.max(bounds.min, Math.min(Number(filterMin), bounds.max))
                : bounds.min;
            const currentMax = hasActiveFilter && Number.isFinite(Number(filterMax))
                ? Math.max(bounds.min, Math.min(Number(filterMax), bounds.max))
                : bounds.max;

            updateModelPriceSliderVisuals(kind, currentMin, currentMax);
            addModelPriceSliderDragEvents(kind);
        }

        function updateModelPriceSliderVisuals(kind, minVal, maxVal) {
            const slider = modelPriceSliders[kind];
            const prefix = modelPriceSliderIdPrefix[kind];
            const span = slider.maxValue - slider.minValue || 1;
            const clampedMin = Math.max(slider.minValue, Math.min(Number(minVal), slider.maxValue));
            const clampedMax = Math.max(slider.minValue, Math.min(Number(maxVal), slider.maxValue));
            const nextMin = Math.min(clampedMin, clampedMax);
            const nextMax = Math.max(clampedMin, clampedMax);
            const minPercent = ((nextMin - slider.minValue) / span) * 100;
            const maxPercent = ((nextMax - slider.minValue) / span) * 100;

            const minThumb = document.getElementById(`${prefix}SliderMin`);
            const maxThumb = document.getElementById(`${prefix}SliderMax`);
            const range = document.getElementById(`${prefix}SliderRange`);
            const minValueEl = document.getElementById(`${prefix}MinValue`);
            const maxValueEl = document.getElementById(`${prefix}MaxValue`);

            if (minThumb) minThumb.style.left = `${minPercent}%`;
            if (maxThumb) maxThumb.style.left = `${maxPercent}%`;
            if (range) {
                range.style.left = `${minPercent}%`;
                range.style.width = `${maxPercent - minPercent}%`;
            }
            if (minValueEl) minValueEl.textContent = formatModelSliderPrice(nextMin);
            if (maxValueEl) maxValueEl.textContent = formatModelSliderPrice(nextMax);

            slider.min = nextMin;
            slider.max = nextMax;
            if (kind === 'input') {
                modelMatrixFilterState.inputMin = nextMin;
                modelMatrixFilterState.inputMax = nextMax;
            } else {
                modelMatrixFilterState.outputMin = nextMin;
                modelMatrixFilterState.outputMax = nextMax;
            }
        }

        function addModelPriceSliderDragEvents(kind) {
            const prefix = modelPriceSliderIdPrefix[kind];
            const minThumb = document.getElementById(`${prefix}SliderMin`);
            const maxThumb = document.getElementById(`${prefix}SliderMax`);
            const trackHost = minThumb ? minThumb.parentElement : null;
            const track = trackHost ? trackHost.querySelector('.slider-track') : null;
            if (!minThumb || !maxThumb || !trackHost || !track) return;

            let isDragging = null;

            const handleDrag = (e) => {
                if (isDragging === null) return;
                const pointX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
                const rect = track.getBoundingClientRect();
                const percent = Math.max(0, Math.min(100, ((pointX - rect.left) / rect.width) * 100));
                const slider = modelPriceSliders[kind];
                const span = slider.maxValue - slider.minValue || 1;
                const value = slider.minValue + (percent / 100) * span;
                const roundedValue = Math.round(value * 100) / 100;

                if (isDragging === 'min') {
                    updateModelPriceSliderVisuals(kind, Math.min(roundedValue, slider.max), slider.max);
                } else {
                    updateModelPriceSliderVisuals(kind, slider.min, Math.max(roundedValue, slider.min));
                }
                applyModelMatrixFilters();
            };

            const stopDrag = () => {
                isDragging = null;
                document.removeEventListener('mousemove', handleDrag);
                document.removeEventListener('mouseup', stopDrag);
                document.removeEventListener('touchmove', handleDrag);
                document.removeEventListener('touchend', stopDrag);
            };

            const startDrag = (type) => (e) => {
                e.preventDefault();
                isDragging = type;
                document.addEventListener('mousemove', handleDrag);
                document.addEventListener('mouseup', stopDrag);
                document.addEventListener('touchmove', handleDrag);
                document.addEventListener('touchend', stopDrag);
            };

            minThumb.addEventListener('mousedown', startDrag('min'));
            minThumb.addEventListener('touchstart', startDrag('min'), { passive: false });
            maxThumb.addEventListener('mousedown', startDrag('max'));
            maxThumb.addEventListener('touchstart', startDrag('max'), { passive: false });
        }

        function getMultiSelectButtonText(selectedValues, allValues) {
            const selected = Array.isArray(selectedValues) ? selectedValues : [];
            if (!selected.length) return '全部';
            if (selected.length === 1) return selected[0];
            if (selected.length === allValues.length) return '全部';
            return `已选 ${selected.length} 项`;
        }

        function renderMultiSelectControl(id, options, selectedValues, filterType, filterKey = '') {
            const selected = Array.isArray(selectedValues) ? selectedValues : [];
            const labelText = getMultiSelectButtonText(selected, options);
            const optionsHtml = options.map(opt => {
                const checked = selected.includes(opt) ? ' checked' : '';
                return `<label class="matrix-multi-option"><input type="checkbox" data-matrix-filter-type="${filterType}"${filterKey ? ` data-matrix-filter-key="${escapeHtml(filterKey)}"` : ''} value="${escapeHtml(opt)}"${checked}>${escapeHtml(opt)}</label>`;
            }).join('');
            return `
                <div class="matrix-multi" data-matrix-multi-id="${escapeHtml(id)}">
                    <button type="button" class="matrix-multi-btn" data-matrix-multi-btn>${escapeHtml(labelText)}</button>
                    <div class="matrix-multi-menu">${optionsHtml || '<div class="matrix-multi-option">暂无选项</div>'}</div>
                </div>
            `;
        }

        function renderMatrixFilterBar(dimensions) {
            const bar = document.getElementById('matrixFilterBar');
            if (!bar) return;
            if (!dimensions.length) {
                bar.innerHTML = '';
                return;
            }

            const currentKeys = new Set(dimensions.map(d => d.key));
            const prevKeys = new Set(Object.keys(matrixFilterState.byKey || {}));
            const sameKeys = currentKeys.size === prevKeys.size && [...currentKeys].every(k => prevKeys.has(k));
            if (!sameKeys) {
                matrixFilterState = {
                    platform: [],
                    byKey: Object.fromEntries(dimensions.map(d => [d.key, getMatrixFilterDefaultValue(d)]))
                };
            }

            const platformOptions = relaysData.map(r => String(r.name || '').trim()).filter(Boolean);
            const uniquePlatformOptions = Array.from(new Set(platformOptions));

            const dimControls = dimensions.map(dim => {
                const key = escapeHtml(dim.key);
                const label = escapeHtml(dim.label);
                const val = matrixFilterState.byKey[dim.key] || '';
                if (isMatrixStarTextDimension(dim)) {
                    const selected = (n) => String(val) === String(n) ? ' selected' : '';

        function applyMatrixFilters() {
            const dimensions = currentMatrixDimensions || [];

            const selectedPlatforms = Array.isArray(matrixFilterState.platform) ? matrixFilterState.platform : [];
            const filtered = relaysData.filter(relay => {
                if (selectedPlatforms.length && !selectedPlatforms.includes(String(relay.name || ''))) {
                    return false;
                }

                for (const dim of dimensions) {
                    const rawFilter = matrixFilterState.byKey[dim.key];
                    const filterVal = Array.isArray(rawFilter) ? rawFilter : String(rawFilter || '').trim();
                    if (!filterVal || (Array.isArray(filterVal) && !filterVal.length)) continue;

                    const cellVal = relay.matrix ? relay.matrix[dim.key] : undefined;
                    if (isMatrixStarTextDimension(dim)) {
                        const stars = getValueStars(cellVal);
                        const minStars = Number(String(filterVal));
                        if (!Number.isFinite(minStars) || stars == null || stars < minStars) return false;
                        continue;
                    }

                    if (isMatrixTagDimension(dim)) {
                        const cellTags = matrixTagPhrasesFromVal(cellVal);
                        if (!Array.isArray(filterVal) || !filterVal.some(tag => cellTags.includes(tag))) return false;
                        continue;
                    }

                    const text = getValueTextForFilter(cellVal).toLowerCase();
                    if (!text.includes(String(filterVal).toLowerCase())) return false;
                }
                return true;
            });

            const sorted = sortMatrixRelays(filtered);
            renderMatrix(sorted, dimensions);

            const resultEl = document.getElementById('matrixFilterResult');
            if (resultEl) {
                resultEl.textContent = `${filtered.length}条/共${relaysData.length}条`;
            }
        }

        function sortMatrixRelays(relays) {
            if (!matrixSortState.key) return relays;
            const { key, direction } = matrixSortState;
            const sorted = [...relays];
            sorted.sort((a, b) => {
                const starsA = getValueStars(a.matrix ? a.matrix[key] : undefined);
                const starsB = getValueStars(b.matrix ? b.matrix[key] : undefined);
                const hasA = Number.isFinite(starsA);
                const hasB = Number.isFinite(starsB);

                if (!hasA && !hasB) return (a.__matrixOriginalIndex || 0) - (b.__matrixOriginalIndex || 0);
                if (!hasA) return 1;
                if (!hasB) return -1;

                if (starsA === starsB) {
                    return (a.__matrixOriginalIndex || 0) - (b.__matrixOriginalIndex || 0);
                }
                return direction === 'asc' ? starsA - starsB : starsB - starsA;
            });
            return sorted;
        }

                    scheduleMatrixRelayout();

        function sortModelMatrixRows(rows) {
            if (!modelMatrixSortState.key) return rows;

            const { key, direction } = modelMatrixSortState;
            const sorted = [...rows];
            sorted.sort((a, b) => {
                if (key === 'name') {
                    const result = a.name.localeCompare(b.name, 'zh-CN');
                    if (result === 0) return a.__modelMatrixOriginalIndex - b.__modelMatrixOriginalIndex;
                    return direction === 'asc' ? result : -result;
                }

                if (key === 'relay') {
                    const result = a.relayName.localeCompare(b.relayName, 'zh-CN');
                    if (result === 0) return a.__modelMatrixOriginalIndex - b.__modelMatrixOriginalIndex;
                    return direction === 'asc' ? result : -result;
                }

                const valueKey = key === 'output' ? 'outputNormalizedValue' : 'inputNormalizedValue';
                const hasA = Number.isFinite(a[valueKey]);
                const hasB = Number.isFinite(b[valueKey]);

                if (!hasA && !hasB) return a.__modelMatrixOriginalIndex - b.__modelMatrixOriginalIndex;
                if (!hasA) return 1;
                if (!hasB) return -1;

                if (a[valueKey] === b[valueKey]) {
                    return a.__modelMatrixOriginalIndex - b.__modelMatrixOriginalIndex;
                }
                return direction === 'asc'
                    ? a[valueKey] - b[valueKey]
                    : b[valueKey] - a[valueKey];
            });

            return sorted;
        }

            wrapper.querySelectorAll('th.model-matrix-sortable').forEach(th => {
                th.classList.remove('matrix-sort-asc', 'matrix-sort-desc');

        function renderModelPriceValue(raw) {

            }
            return `<span class="price-token">${escapeHtml(raw)}</span>`;
        }

        function compareModelMatrixRowsByPrice(a, b) {
            const hasInputA = Number.isFinite(a.inputNormalizedValue);
            const hasInputB = Number.isFinite(b.inputNormalizedValue);
            const hasOutputA = Number.isFinite(a.outputNormalizedValue);
            const hasOutputB = Number.isFinite(b.outputNormalizedValue);
            const totalA = (hasInputA ? a.inputNormalizedValue : 0) + (hasOutputA ? a.outputNormalizedValue : 0);
            const totalB = (hasInputB ? b.inputNormalizedValue : 0) + (hasOutputB ? b.outputNormalizedValue : 0);

            if ((hasInputA || hasOutputA) && !(hasInputB || hasOutputB)) return -1;
            if (!(hasInputA || hasOutputA) && (hasInputB || hasOutputB)) return 1;
            if (totalA !== totalB) return totalA - totalB;

            if (hasInputA && hasInputB && a.inputNormalizedValue !== b.inputNormalizedValue) {
                return a.inputNormalizedValue - b.inputNormalizedValue;
            }
            if (hasOutputA && hasOutputB && a.outputNormalizedValue !== b.outputNormalizedValue) {
                return a.outputNormalizedValue - b.outputNormalizedValue;
            }

            return a.__modelMatrixOriginalIndex - b.__modelMatrixOriginalIndex;
        }

        function pickCheapestModelGroupRows(rows) {
            const bestByKey = new Map();

            rows.forEach(row => {
                const key = `${row.relayId}__${row.name}`;
                const currentBest = bestByKey.get(key);
                if (!currentBest || compareModelMatrixRowsByPrice(row, currentBest) < 0) {
                    bestByKey.set(key, row);
                }
            });

            return rows.filter(row => bestByKey.get(`${row.relayId}__${row.name}`) === row);
        }

        function renderModelMatrix(rows) {

            wrapper.innerHTML = `

                            <th class="matrix-dim-th matrix-sortable model-matrix-sortable" data-model-matrix-sort-key="output" style="width:${PRICE_W}px;min-width:${PRICE_W}px">${escapeHtml(getRelayPageText('filters.outputPriceInCny'))}</th>
                        </tr>
                    </thead>
                    <tbody>${tbody}</tbody>
                </table>
            `;

            updateModelMatrixSortHeaders(wrapper);
            bindModelMatrixSortHandlers(wrapper);
        }

        function applyModelMatrixFilters() {
            const selectedRelays = Array.isArray(modelMatrixFilterState.relay) ? modelMatrixFilterState.relay : [];
            const selectedModels = Array.isArray(modelMatrixFilterState.model) ? modelMatrixFilterState.model : [];
            const inputMin = Number(modelMatrixFilterState.inputMin);
            const inputMax = Number(modelMatrixFilterState.inputMax);
            const outputMin = Number(modelMatrixFilterState.outputMin);
            const outputMax = Number(modelMatrixFilterState.outputMax);

            const filtered = modelMatrixData.filter(row => {
                if (selectedRelays.length && !selectedRelays.includes(row.relayId)) return false;
                if (selectedModels.length && !selectedModels.includes(row.name)) return false;

                if (modelMatrixFilterState.inputMin !== '') {
                    if (!Number.isFinite(row.inputNormalizedValue) || row.inputNormalizedValue < inputMin) return false;
                }
                if (modelMatrixFilterState.inputMax !== '') {
                    if (!Number.isFinite(row.inputNormalizedValue) || row.inputNormalizedValue > inputMax) return false;
                }
                if (modelMatrixFilterState.outputMin !== '') {
                    if (!Number.isFinite(row.outputNormalizedValue) || row.outputNormalizedValue < outputMin) return false;
                }
                if (modelMatrixFilterState.outputMax !== '') {
                    if (!Number.isFinite(row.outputNormalizedValue) || row.outputNormalizedValue > outputMax) return false;
                }

                return true;
            });

            const displayRows = modelMatrixFilterState.cheapestOnly
                ? pickCheapestModelGroupRows(filtered)
                : filtered;

            const sorted = sortModelMatrixRows(displayRows);
            renderModelMatrix(sorted);

            const resultEl = document.getElementById('modelMatrixFilterResult');
            if (resultEl) {
                resultEl.textContent = `${displayRows.length}条/共${modelMatrixData.length}条`;
            }
        }

        function scheduleModelMatrixRelayout() {

        function bindModelMatrixResizeObserver() {

            if (!wrapper) return;

            lastModelMatrixWrapperWidth = Math.round(wrapper.getBoundingClientRect().width);

            if (typeof ResizeObserver === 'function' && !modelMatrixResizeObserver) {
                modelMatrixResizeObserver = new ResizeObserver(entries => {
                    const entry = entries[0];
                    const nextWidth = Math.round(entry.contentRect.width);
                    if (!nextWidth || nextWidth === lastModelMatrixWrapperWidth) return;
                    lastModelMatrixWrapperWidth = nextWidth;
                    scheduleModelMatrixRelayout();
                });
                modelMatrixResizeObserver.observe(wrapper);
            }

            window.addEventListener('resize', scheduleModelMatrixRelayout, { passive: true });
        }

        /** 1–5 星 HTML；非法或缺省返回空字符串 */
        function renderStarRatingHtml(raw) {
            const n = Math.round(Number(raw));
            if (!Number.isFinite(n) || n < 1 || n > 5) return '';
            const on = '★'.repeat(n);
            const off = '☆'.repeat(5 - n);
            return `<span class="star-rating" role="img" aria-label="${n} 星，满分 5 星"><span class="stars-on" aria-hidden="true">${on}</span><span class="stars-off" aria-hidden="true">${off}</span></span>`;
        }

        /** 星文格底纹：1–2 星偏红，3–4 星无底色，5 星偏绿 */
        function matrixStarTierClass(raw) {
            const s = Math.round(Number(raw));
            if (!Number.isFinite(s) || s < 1 || s > 5) return '';
            if (s <= 2) return 'matrix-star-tier-low';
            if (s === 5) return 'matrix-star-tier-top';
            return '';
        }

        /** 标签列：字符串数组，或兼容旧数据用顿号/逗号分隔的一段文字 */
        function matrixTagPhrasesFromVal(val) {
            if (Array.isArray(val)) {
                return val.map(x => String(x).trim()).filter(Boolean);
            }
            if (typeof val === 'string' && val.trim()) {
                return val.split(/[、，,]/).map(s => s.trim()).filter(Boolean);
            }
            return [];
        }

        function matrixTagCellHtml(phrases) {
            if (!phrases.length) {
                return `<td class="matrix-cell-tags"><span class="price-dash">—</span></td>`;
            }
            const inner = phrases.map((t, i) => {
                const variant = (i % 3) + 1;
                return `<span class="matrix-tag matrix-tag--${variant}">${escapeHtml(t)}</span>`;
            }).join('');
            return `<td class="matrix-cell-tags"><div class="matrix-tag-list">${inner}</div></td>`;
        }

        // ── 渲染矩阵 ──
        function renderMatrix(relays, dimensions) {
            const wrapper = document.getElementById('matrixWrapper');
            if (!relays.length || !dimensions.length) {
                wrapper.innerHTML = `<div class="loading-state">${escapeHtml(getRelayPageText('messages.empty'))}</div>`;
                return;
            }

            function matrixCellTd(val, dim) {
                const dimKey = dim.key;
                const ratingCol = dimKey === 'rating' ? ' matrix-col-rating' : '';

                if (isMatrixTagDimension(dim)) {
                    const tagCell = matrixTagCellHtml(matrixTagPhrasesFromVal(val));
                    if (ratingCol) return tagCell.replace('class="matrix-cell-tags"', 'class="matrix-cell-tags matrix-col-rating"');
                    return tagCell;
                }
                if (isMatrixStarTextDimension(dim)) {
                    let v = val;
                    if (typeof v === 'number' && Number.isFinite(v)) {
                        v = { stars: Math.round(v), text: '' };
                    }
                    if (v && typeof v === 'object' && !Array.isArray(v) && ('stars' in v || 'text' in v)) {
                        const tier = matrixStarTierClass(v.stars);
                        const starsHtml = renderStarRatingHtml(v.stars) || '<span class="price-dash">—</span>';
                        const t = v.text != null ? String(v.text) : '';
                        const textHtml = t ? escapeHtmlPreserveBreaks(t) : '<span class="price-dash">—</span>';
                        const cls = ['matrix-cell-star-text', tier || null, ratingCol.trim()].filter(Boolean).join(' ');
                        return `<td class="${cls}"><div class="matrix-cell-stars-line">${starsHtml}</div><div class="matrix-cell-desc-line">${textHtml}</div></td>`;
                    }
                    if (typeof v === 'string' && v !== '') {
                        return `<td class="matrix-cell-star-text${ratingCol}"><div class="matrix-cell-stars-line"><span class="price-dash">—</span></div><div class="matrix-cell-desc-line">${escapeHtmlPreserveBreaks(v)}</div></td>`;
                    }
                    return `<td class="matrix-cell-star-text${ratingCol}"><span class="price-dash">—</span></td>`;
                }
                if (Array.isArray(val)) {
                    const tags = val.map(v => `<span class="protocol-tag">${escapeHtml(v)}</span>`).join('');
                    return `<td${ratingCol ? ` class="${ratingCol.trim()}"` : ''}>${tags}</td>`;
                }
                if (val === undefined || val === null || val === '') {
                    return `<td${ratingCol ? ` class="${ratingCol.trim()}"` : ''}><span class="price-dash">—</span></td>`;
                }
                const strVal = String(val);
                return `<td${ratingCol ? ` class="${ratingCol.trim()}"` : ''}>${escapeHtmlPreserveBreaks(strVal)}</td>`;
            }

            const PLATFORM_W = 140; // ── 平台列宽度
            const TAG_W = 140;  // ── 标签列宽度
            const DIM_MIN = 250;  // ── 其他维度最小宽度（乘以权重后可能更宽）
            const RATING_WEIGHT = 1.2;  // ── 综合评价维度权重，其他维度默认为 1，权重越高列越宽
            const wrapperWidth = Math.round(wrapper.clientWidth || 0);
            const tagDimensionCount = dimensions.filter(d => isMatrixTagDimension(d)).length;
            const flexibleDimensions = dimensions.filter(d => !isMatrixTagDimension(d));
            const totalWeight = flexibleDimensions.reduce((s, d) => s + (d.key === 'rating' ? RATING_WEIGHT : 1), 0);
            const baseFlexibleWidth = DIM_MIN * totalWeight;
            const minTableW = Math.max(640, PLATFORM_W + (TAG_W * tagDimensionCount) + baseFlexibleWidth);
            const targetTableW = Math.max(minTableW, wrapperWidth);
            const availableFlexibleWidth = Math.max(baseFlexibleWidth, targetTableW - PLATFORM_W - (TAG_W * tagDimensionCount));
            const dimensionWidths = new Map();
            let remainingFlexibleWidth = availableFlexibleWidth;
            let remainingWeight = totalWeight;

            dimensions.forEach(dim => {
                if (isMatrixTagDimension(dim)) {
                    dimensionWidths.set(dim.key, TAG_W);
                    return;
                }

                const weight = dim.key === 'rating' ? RATING_WEIGHT : 1;
                const dimPx = remainingWeight > 0
                    ? Math.round((remainingFlexibleWidth * weight) / remainingWeight)
                    : Math.round(DIM_MIN * weight);

                dimensionWidths.set(dim.key, dimPx);
                remainingFlexibleWidth -= dimPx;
                remainingWeight -= weight;
            });

            const tableWidth = PLATFORM_W + dimensions.reduce((sum, dim) => sum + (dimensionWidths.get(dim.key) || 0), 0);

            const theadDimCols = dimensions.map(dim => {
                const thExtra = isMatrixStarTextDimension(dim) ? ' matrix-th-star-text' : '';
                const ratingTh = dim.key === 'rating' ? ' matrix-col-rating' : '';
                const sortableTh = isMatrixStarTextDimension(dim) ? ' matrix-sortable' : '';
                const sortAttr = isMatrixStarTextDimension(dim) ? ` data-matrix-sort-key="${escapeHtml(dim.key)}"` : '';
                const dimPx = dimensionWidths.get(dim.key) || TAG_W;
                const helpText = typeof dim.helpText === 'string' ? dim.helpText.trim() : '';
                if (helpText) {
                    return `<th class="matrix-dim-th${thExtra}${ratingTh}${sortableTh}"${sortAttr} style="width:${dimPx}px;min-width:${dimPx}px"><span class="matrix-th-help"><button type="button" class="matrix-help-trigger" aria-label="${escapeHtml(dim.label)}说明">${escapeHtml(dim.label)}</button><span class="matrix-help-bubble" role="tooltip">${escapeHtml(helpText)}</span></span></th>`;
                }
                return `<th class="matrix-dim-th${thExtra}${ratingTh}${sortableTh}"${sortAttr} style="width:${dimPx}px;min-width:${dimPx}px">${escapeHtml(dim.label)}</th>`;
            }).join('');

            const tbody = relays.map(r => {
                const cells = dimensions.map(dim => {
                    const val = r.matrix ? r.matrix[dim.key] : undefined;
                    return matrixCellTd(val, dim);
                }).join('');
                return `<tr>
                    <td class="platform-label">
                        <span class="platform-name">${escapeHtml(r.name)}</span>
                        <div class="platform-actions">
                            ${r.homeUrl ? `<a class="platform-action-btn" href="${escapeHtml(r.homeUrl)}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(getRelayPageText('actions.openHomeTitle'))}">${escapeHtml(getRelayPageText('actions.home'))}${ICON_EXTERNAL}</a>` : ''}
                            <a class="platform-action-btn" href="#relay-${escapeHtml(r.id)}" title="${escapeHtml(getRelayPageText('actions.jumpToDetailTitle'))}">${escapeHtml(getRelayPageText('actions.detail'))}${ICON_DOWN}</a>
                        </div>
                    </td>
                    ${cells}
                </tr>`;
            }).join('');

            wrapper.innerHTML = `
                <table class="matrix-table" style="width:${tableWidth}px;min-width:${minTableW}px">
                    <thead>
                        <tr>
                            <th style="width:${PLATFORM_W}px;min-width:${PLATFORM_W}px">${escapeHtml(getRelayPageText('tableLabels.platform'))}</th>
                            ${theadDimCols}
                        </tr>
                    </thead>
                    <tbody>${tbody}</tbody>
                </table>
            `;
            updateMatrixSortHeaders(wrapper);
            bindMatrixSortHandlers(wrapper);
        }

        // ── 渲染平台详情卡片 ──
        function renderRelayCards(relays) {
            const container = document.getElementById('relayCards');
            if (!relays.length) {
                container.innerHTML = `<div class="loading-state">${escapeHtml(getRelayPageText('messages.empty'))}</div>`;
                return;
            }

            container.innerHTML = relays.map(relay => {
                const detail = relay.detail || {};

                const modelsRows = (detail.keyModels || []).map(m => {
                    const noteCell = m.note
                        ? escapeHtml(m.note)
                        : '<span class="price-dash">—</span>';
                    return `
                        <tr>
                            <td>${escapeHtml(m.name)}</td>
                            <td>${escapeHtml(getModelGroupLabel(m))}</td>
                            <td>${renderModelPriceValue(m.inputPer1M)}</td>
                            <td>${renderModelPriceValue(m.outputPer1M)}</td>
                            <td>${noteCell}</td>
                        </tr>
                    `;
                }).join('');

                const modelsSection = modelsRows ? `
                    <div class="relay-section">
                        <h4>${escapeHtml(getRelayPageText('sections.detailPricingTitle'))}</h4>
                        <table class="models-mini-table">
                            <thead>
                                <tr>
                                    <th>${escapeHtml(getRelayPageText('tableLabels.model'))}</th>
                                    <th>${escapeHtml(getRelayPageText('tableLabels.group'))}</th>
                                    <th>${escapeHtml(getRelayPageText('tableLabels.inputPer1M'))}</th>
                                    <th>${escapeHtml(getRelayPageText('tableLabels.outputPer1M'))}</th>
                                    <th>${escapeHtml(getRelayPageText('tableLabels.note'))}</th>
                                </tr>
                            </thead>
                            <tbody>${modelsRows}</tbody>
                        </table>
                    </div>
                ` : '';

                const notesSection = detail.notes ? `
                    <div class="relay-section relay-section-notes">
                        <h4>${escapeHtml(getRelayPageText('sections.detailNotesTitle'))}</h4>
                        <p>${escapeHtmlPreserveBreaks(detail.notes)}</p>
                    </div>
                ` : '';

                return `
                    <div class="relay-card" id="relay-${escapeHtml(relay.id)}">
                        <div class="relay-card-header">
                            <div class="relay-card-title">
                                <span class="relay-name-lg">${escapeHtml(relay.name)}</span>
                                <span class="relay-card-meta">
                                    ${relay.homeUrl ? `<a href="${escapeHtml(relay.homeUrl)}" target="_blank" class="home-link">${escapeHtml(getRelayPageText('actions.home'))} →</a>` : ''}
                                    <a href="${escapeHtml(relay.pricingUrl)}" target="_blank" class="pricing-link">${escapeHtml(getRelayPageText('actions.pricing'))} →</a>
                                    <span class="updated-at">${escapeHtml(getRelayPageText('actions.updatedAtPrefix'))}${escapeHtml(relay.updatedAt)}</span>
                                </span>
                            </div>
                        </div>
                        <div class="relay-card-body">
                            ${detail.description ? `
                                <div class="relay-section">
                                    <h4>${escapeHtml(getRelayPageText('sections.detailDescriptionTitle'))}</h4>
                                    <p>${escapeHtmlPreserveBreaks(detail.description)}</p>
                                </div>
                            ` : ''}
                            ${modelsSection}
                            ${notesSection}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ── 渲染底部说明 ──
        function renderNotes(notes) {
            if (!notes || !notes.length) return;
            document.getElementById('notesSection').innerHTML = `
                <h3>${escapeHtml(getRelayPageText('sections.notesTitle'))}</h3>
                <ul>${notes.map(n => `<li>${escapeHtml(n)}</li>`).join('')}</ul>
            `;
        }

        // ── 渲染更新日志 ──
        function renderUpdates(updates) {
            if (!updates || !updates.length) return;
            const items = updates.map(u => `
                <li class="update-item">
                    <div class="log-date">${escapeHtml(u.date)}</div>
                    <ul class="update-items">
                        ${u.items.map(i => `<li>${escapeHtml(i)}</li>`).join('')}
                    </ul>
                </li>
            `).join('');
            document.getElementById('updatesSection').innerHTML = `
                <h3>${escapeHtml(getRelayPageText('sections.updatesTitle'))}</h3>
                <ul class="updates-list">${items}</ul>
            `;
        }

        // ── 应用配置 ──
        function applyConfig(config) {
            if (config.header) {
                const h = config.header;
                document.title = `${h.title} 对比`;
                document.getElementById('pageTitle').textContent = h.title;
                document.getElementById('updateDate').textContent = h.updateDate;
                document.getElementById('subtitle').textContent = h.subtitle;
                const headerInfoEl = document.getElementById('headerInfo');
                if (typeof h.info === 'string' && h.info.trim()) {
                    headerInfoEl.innerHTML = escapeHtmlPreserveBreaks(h.info);
                    headerInfoEl.hidden = false;
                } else {
                    headerInfoEl.hidden = true;
                }
                if (h.github) {
                    document.getElementById('githubLink').href = h.github.url;
                    document.getElementById('githubText').textContent = h.github.text;
                }
            }
            document.getElementById('matrixSectionTitle').textContent = getRelayPageText('sections.matrixTitle');
            document.getElementById('modelMatrixSectionTitle').textContent = getRelayPageText('sections.modelMatrixTitle');
            document.getElementById('modelMatrixSectionInfo').innerHTML = escapeHtmlPreserveBreaks(getRelayPageText('sections.modelMatrixInfo'));
            document.getElementById('detailSectionTitle').textContent = getRelayPageText('sections.detailTitle');

            const loadingText = getRelayPageText('messages.loading');
            const matrixLoadingState = document.getElementById('matrixLoadingState');
            const modelMatrixLoadingState = document.getElementById('modelMatrixLoadingState');
            const relayCardsLoadingState = document.getElementById('relayCardsLoadingState');
            if (matrixLoadingState) matrixLoadingState.textContent = loadingText;
            if (modelMatrixLoadingState) modelMatrixLoadingState.textContent = loadingText;
            if (relayCardsLoadingState) relayCardsLoadingState.textContent = loadingText;

            renderNotes(config.notes);
            renderUpdates(config.updates);
        }

        // ── 加载配置 ──
        async function loadConfig() {
            try {
                const res = await fetch(CONFIG_FILE_PATH, { cache: 'no-store' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                pageConfig = await res.json();
                pageConfig.matrixDimensions = normalizeMatrixDimensions(pageConfig.matrixDimensions);
                applyConfig(pageConfig);
            } catch (e) {
                console.error('加载配置失败:', e);
            }
        }

        // ── 加载数据 ──
        async function loadRelays() {
            try {
                const res = await fetch(RELAYS_FILE_PATH, { cache: 'no-store' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const rawRelays = await res.json();
                relaysData = Array.isArray(rawRelays)
                    ? rawRelays.map((relay, index) => ({ ...relay, __matrixOriginalIndex: index }))
                    : [];

                const dimensions = (pageConfig.matrixDimensions) || [];
                currentMatrixDimensions = dimensions;
                modelMatrixData = buildModelMatrixData(relaysData);
                renderMatrixFilterBar(dimensions);
                applyMatrixFilters();
                renderModelMatrixFilterBar();
                applyModelMatrixFilters();
                renderRelayCards(relaysData);

                console.log(`成功加载 ${relaysData.length} 个中转站数据`);
            } catch (e) {
                console.error('加载数据失败:', e);
                const loadErrorText = escapeHtml(getRelayPageText('messages.loadError'));
                document.getElementById('matrixWrapper').innerHTML =
                    `<div class="loading-state">${loadErrorText}</div>`;
                document.getElementById('modelMatrixWrapper').innerHTML =
                    `<div class="loading-state">${loadErrorText}</div>`;
                document.getElementById('relayCards').innerHTML =
                    `<div class="loading-state">${loadErrorText}</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            bindMatrixResizeObserver();
            bindModelMatrixResizeObserver();
            await loadConfig();
            await loadRelays();
        });

    </script>
    <script src="scripts/shared.js"></script>
</body>
</html>
