<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 中转站 对比</title>
    <link rel="stylesheet" href="styles/shared.css">
    <style>
        /* relays.html 覆盖 shared.css 的差异值 */
        html { scroll-behavior: smooth; }
        .header .subtitle { margin-bottom: 8px; }
        .notes-section li { line-height: 1.65; }

        /* ── 区块标题 ── */
        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        /* ── 快速对比矩阵 ── */
        .matrix-section {
            margin-bottom: 48px;
        }

        .matrix-wrapper {
            overflow-x: auto;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 640px;
        }

        .matrix-table thead th {
            background: var(--bg-tertiary);
            padding: 16px 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: left;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        .matrix-table thead th:first-child {
            background: var(--bg-tertiary);
            color: var(--text-tertiary);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 168px;
            min-width: 168px;
            max-width: 220px;
            position: sticky;
            left: 0;
            z-index: 2;
            border-right: 1px solid var(--border-color);
            vertical-align: bottom;
        }

        .matrix-table thead th.matrix-dim-th {
            text-align: left;
            min-width: 140px;
            max-width: 280px;
            white-space: normal;
            vertical-align: bottom;
            line-height: 1.35;
        }

        .platform-name {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
            line-height: 1.3;
        }

        a.platform-jump {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: inherit;
            text-decoration: none;
            cursor: pointer;
            border-radius: 4px;
            outline-offset: 2px;
        }

        a.platform-jump:hover {
            color: var(--accent-primary);
            text-decoration: underline;
        }

        a.platform-jump .link-icon {
            flex-shrink: 0;
            color: var(--accent-primary);
            opacity: 0.75;
            transition: opacity 0.15s;
        }

        a.platform-jump:hover .link-icon {
            opacity: 1;
        }

        .platform-type {
            display: inline-block;
            font-size: 11px;
            font-weight: 500;
            color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.08);
            padding: 2px 8px;
            border-radius: 20px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .matrix-table tbody tr {
            border-bottom: 1px solid var(--border-light);
            transition: background 0.15s;
        }

        .matrix-table tbody tr:last-child {
            border-bottom: none;
        }

        .matrix-table tbody tr:hover {
            background: rgba(99, 102, 241, 0.03);
        }

        .matrix-table tbody tr:hover .platform-label {
            background: #e8eaf6;
        }

        .platform-label {
            padding: 14px 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            background: var(--bg-tertiary);
            position: sticky;
            left: 0;
            z-index: 1;
            border-right: 1px solid var(--border-color);
            transition: background 0.15s;
            vertical-align: top;
        }

        .matrix-table tbody td {
            padding: 14px 20px;
            font-size: 13px;
            color: var(--text-secondary);
            vertical-align: top;
            line-height: 1.6;
        }

        /* 星文列说明文字按星级分档着色：1 红 / 2–3 黄 / 4–5 绿（星星保持默认金色，不变色） */
        .matrix-table td.matrix-star-tier-1 .matrix-cell-desc-line {
            color: var(--accent-error);
        }

        .matrix-table td.matrix-star-tier-2 .matrix-cell-desc-line {
            color: var(--accent-warning);
        }

        .matrix-table td.matrix-star-tier-4 .matrix-cell-desc-line {
            color: var(--accent-success);
        }

        .matrix-table thead th.matrix-th-rating {
            text-align: center;
        }

        .matrix-rating-cell {
            white-space: nowrap;
            vertical-align: middle;
            text-align: center;
        }

        .star-rating {
            display: inline-flex;
            align-items: center;
            font-size: 16px;
            line-height: 1;
            letter-spacing: 1px;
        }

        .star-rating .stars-on {
            color: #d9a227;
        }

        .star-rating .stars-off {
            color: var(--text-tertiary);
            opacity: 0.42;
        }

        .relay-star-inline {
            display: inline-flex;
            align-items: center;
            vertical-align: middle;
        }

        .relay-star-inline .star-rating {
            font-size: 15px;
        }

        .matrix-cell-star-text {
            vertical-align: top;
        }

        .matrix-cell-star-text .matrix-cell-stars-line {
            text-align: center;
            margin-bottom: 8px;
        }

        .matrix-cell-star-text .matrix-cell-stars-line .star-rating {
            font-size: 14px;
        }

        .matrix-cell-desc-line {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.55;
        }

        .protocol-tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            margin: 2px 2px 2px 0;
            white-space: nowrap;
        }

        /* ── 平台详情区 ── */
        .relays-detail-section {
            margin-bottom: 48px;
        }

        .relay-cards {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .relay-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            transition: box-shadow 0.3s;
            scroll-margin-top: 24px;
        }

        .relay-card:hover {
            box-shadow: var(--shadow-lg);
        }

        .relay-card-header {
            padding: 24px 28px 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
            background: linear-gradient(to right, rgba(99, 102, 241, 0.03), transparent);
        }

        .relay-card-title {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .relay-name-lg {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .type-badge-lg {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(99, 102, 241, 0.25);
        }

        .relay-card-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .pricing-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 500;
            color: var(--accent-primary);
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: var(--radius-md);
            transition: all 0.2s;
        }

        .pricing-link:hover {
            background: rgba(99, 102, 241, 0.08);
            border-color: var(--accent-primary);
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            transition: all 0.2s;
        }

        .home-link:hover {
            background: var(--bg-tertiary);
            border-color: var(--text-secondary);
        }

        .updated-at {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .relay-card-body {
            padding: 0 28px 28px;
        }

        .relay-section {
            padding: 20px 0;
            border-bottom: 1px solid var(--border-light);
        }

        .relay-section:last-child {
            border-bottom: none;
        }

        .relay-section h4 {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .relay-section p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.75;
        }

        .relay-section-notes p {
            font-size: 13px;
            color: var(--text-tertiary);
            line-height: 1.7;
        }

        /* ── 模型价格子表 ── */
        .models-mini-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 4px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .models-mini-table thead th {
            background: var(--bg-tertiary);
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 1px solid var(--border-color);
        }

        .models-mini-table tbody tr {
            border-bottom: 1px solid var(--border-light);
            transition: background 0.15s;
        }

        .models-mini-table tbody tr:last-child {
            border-bottom: none;
        }

        .models-mini-table tbody tr:hover {
            background: var(--bg-tertiary);
        }

        .models-mini-table tbody td {
            padding: 11px 16px;
            font-size: 13px;
            color: var(--text-secondary);
            vertical-align: middle;
        }

        .models-mini-table tbody td:first-child {
            font-weight: 600;
            color: var(--text-primary);
        }

        .price-token {
            font-weight: 700;
            color: var(--accent-primary);
            white-space: nowrap;
        }

        .price-free {
            font-weight: 600;
            color: var(--accent-success);
        }

        .price-dash {
            color: var(--text-tertiary);
        }

        /* ── 加载动画 ── */
        .loading-state {
            text-align: center;
            padding: 80px 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* ── 滚动条 ── */
        .matrix-wrapper::-webkit-scrollbar {
            height: 6px;
        }

        .matrix-wrapper::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        .matrix-wrapper::-webkit-scrollbar-thumb {
            background: var(--text-tertiary);
            border-radius: 3px;
        }

        /* ── 响应式 ── */
        @media (max-width: 1600px) {
            body { padding: 48px 80px; }
            .container { max-width: 1280px; }
        }

        @media (max-width: 1200px) {
            body { padding: 40px 40px; }
            .container { max-width: 1100px; }
        }

        @media (max-width: 768px) {
            body { padding: 24px 16px; }
            .container { max-width: 100%; }
            .header { margin-bottom: 24px; padding: 24px 0; }
            .header h1 { font-size: 24px; }
            .header .subtitle { font-size: 14px; }
            .relay-card-header { flex-direction: column; }
            .relay-card-body { padding: 0 16px 20px; }
            .relay-card-header { padding: 16px 16px 14px; }
            .models-mini-table { display: block; overflow-x: auto; }
        }

        @media (max-width: 480px) {
            body { padding: 16px 12px; }
            .header { padding: 16px 0; }
            .header h1 { font-size: 20px; }
            .github-link span { display: none; }
            .page-tab { padding: 8px 12px; font-size: 13px; }
        }

    </style>
</head>
<body>
    <div class="container">

        <!-- 页面导航 Tab -->
        <nav class="page-nav">
            <a href="index.html" class="page-tab">国内 Coding Plan</a>
            <a href="tools.html" class="page-tab">AI 编程工具</a>
            <a href="relays.html" class="page-tab active">API 中转站</a>
            <div class="settings-wrapper">
                <button class="settings-btn" id="settingsBtn" title="设置" aria-label="设置">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                            <span class="toggle-slider"></span>
                        </label>

                </div>
            </div>
        </nav>

        <!-- 顶部标题 -->
        <div class="header">
            <a href="https://github.com/wmpeng/codingplan" target="_blank" class="github-link" id="githubLink">

                </svg>
                <span id="githubText">GitHub</span>
            </a>
            <h1 id="pageTitle">API 中转站</h1>
            <div class="update-date" id="updateDate">更新日期 2026.4.7</div>
            <div class="subtitle" id="subtitle">OpenRouter 等 API 中转与云推理平台，综合评价、类型、价格、透明度、模型覆盖、可用性、国内支付与适合场景等维度对比</div>
        </div>

        <hr class="section-divider">

        <!-- 快速对比矩阵 -->
        <div class="matrix-section">
            <h2 class="section-title">快速对比</h2>
            <div class="matrix-wrapper" id="matrixWrapper">
                <div class="loading-state">加载中...</div>
            </div>
        </div>

        <hr class="section-divider">

        <!-- 平台详情区 -->
        <div class="relays-detail-section">
            <h2 class="section-title">详细介绍</h2>
            <div class="relay-cards" id="relayCards">
                <div class="loading-state">加载中...</div>

        <!-- 底部说明 -->

    <script>
        const RELAYS_FILE_PATH = './relays.json';
        const CONFIG_FILE_PATH = './relays-config.json';

        /** 快速对比：平台名跳转详情旁的右上箭头图标 */
        const ICON_EXTERNAL = '<svg class="link-icon link-icon--external" width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" d="M15 3h6v6"/><path stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" d="M10 14 21 3"/></svg>';

        let relaysData = [];
        let pageConfig = {};

        /** 1–5 星 HTML；非法或缺省返回空字符串 */
        function renderStarRatingHtml(raw) {
            const n = Math.round(Number(raw));
            if (!Number.isFinite(n) || n < 1 || n > 5) return '';
            const on = '★'.repeat(n);
            const off = '☆'.repeat(5 - n);
            return `<span class="star-rating" role="img" aria-label="${n} 星，满分 5 星"><span class="stars-on" aria-hidden="true">${on}</span><span class="stars-off" aria-hidden="true">${off}</span></span>`;
        }

        /** 根据星级返回 td/容器 class：1→红，2–3→黄，4–5→绿 */
        function matrixStarTierClass(raw) {
            const s = Math.round(Number(raw));
            if (!Number.isFinite(s) || s < 1 || s > 5) return '';
            if (s === 1) return 'matrix-star-tier-1';
            if (s <= 3) return 'matrix-star-tier-2';
            return 'matrix-star-tier-4';
        }

        // ── 渲染矩阵 ──
        function renderMatrix(relays, dimensions) {
            const wrapper = document.getElementById('matrixWrapper');
            if (!relays.length || !dimensions.length) {
                wrapper.innerHTML = '<div class="loading-state">暂无数据</div>';
                return;
            }

            const starTextKeys = new Set(pageConfig.matrixStarTextKeys || [
                'billingModel', 'transparency', 'modelCoverage', 'cnAccess', 'cnPayment'
            ]);

            function matrixCellTd(val, dimKey) {
                if (dimKey === 'rating') {
                    const stars = renderStarRatingHtml(val);
                    if (!stars) {
                        return `<td class="matrix-rating-cell"><span class="price-dash">—</span></td>`;
                    }
                    return `<td class="matrix-rating-cell">${stars}</td>`;
                }
                if (starTextKeys.has(dimKey)) {
                    if (val && typeof val === 'object' && !Array.isArray(val) && ('stars' in val || 'text' in val)) {
                        const tier = matrixStarTierClass(val.stars);
                        const starsHtml = renderStarRatingHtml(val.stars) || '<span class="price-dash">—</span>';
                        const t = val.text != null ? String(val.text) : '';
                        const textHtml = t ? escapeHtml(t) : '<span class="price-dash">—</span>';
                        return `<td class="matrix-cell-star-text ${tier}"><div class="matrix-cell-stars-line">${starsHtml}</div><div class="matrix-cell-desc-line">${textHtml}</div></td>`;
                    }
                    if (typeof val === 'string' && val !== '') {
                        return `<td class="matrix-cell-star-text"><div class="matrix-cell-stars-line"><span class="price-dash">—</span></div><div class="matrix-cell-desc-line">${escapeHtml(val)}</div></td>`;
                    }
                    return `<td class="matrix-cell-star-text"><span class="price-dash">—</span></td>`;
                }
                if (Array.isArray(val)) {
                    const tags = val.map(v => `<span class="protocol-tag">${escapeHtml(v)}</span>`).join('');
                    return `<td>${tags}</td>`;
                }
                if (val === undefined || val === null || val === '') {
                    return `<td><span class="price-dash">—</span></td>`;
                }
                const strVal = String(val);
                return `<td>${escapeHtml(strVal)}</td>`;
            }

            const theadDimCols = dimensions.map(dim => {
                const thExtra = dim.key === 'rating' ? ' matrix-th-rating' : '';
                return `<th class="matrix-dim-th${thExtra}">${escapeHtml(dim.label)}</th>`;
            }).join('');

            const tbody = relays.map(r => {
                const cells = dimensions.map(dim => {
                    const val = r.matrix ? r.matrix[dim.key] : undefined;
                    return matrixCellTd(val, dim.key);
                }).join('');
                return `<tr>
                    <td class="platform-label">
                        <a class="platform-name platform-jump" href="#relay-${escapeHtml(r.id)}" title="跳转至下方详细介绍">${escapeHtml(r.name)}${ICON_EXTERNAL}</a>
                        <span class="platform-type">${escapeHtml(r.type)}</span>
                    </td>
                    ${cells}
                </tr>`;
            }).join('');

            wrapper.innerHTML = `
                <table class="matrix-table">
                    <thead>
                        <tr>
                            <th>平台</th>
                            ${theadDimCols}
                        </tr>
                    </thead>
                    <tbody>${tbody}</tbody>
                </table>
            `;
        }

        // ── 渲染平台详情卡片 ──
        function renderRelayCards(relays) {
            const container = document.getElementById('relayCards');
            if (!relays.length) {
                container.innerHTML = '<div class="loading-state">暂无数据</div>';
                return;
            }

            container.innerHTML = relays.map(relay => {
                const detail = relay.detail || {};
                const ratingStars = relay.matrix && relay.matrix.rating != null
                    ? renderStarRatingHtml(relay.matrix.rating)
                    : '';

                const modelsRows = (detail.keyModels || []).map(m => {
                    const inputCell = m.inputPer1M === '$0.00'
                        ? `<td><span class="price-free">免费</span></td>`
                        : `<td><span class="price-token">${escapeHtml(m.inputPer1M)}</span></td>`;
                    const outputCell = m.outputPer1M === '$0.00'
                        ? `<td><span class="price-free">免费</span></td>`
                        : `<td><span class="price-token">${escapeHtml(m.outputPer1M)}</span></td>`;
                    return `
                        <tr>
                            <td>${escapeHtml(m.name)}</td>
                            ${inputCell}
                            ${outputCell}
                            <td>${escapeHtml(m.note || '')}</td>
                        </tr>
                    `;
                }).join('');

                const modelsSection = modelsRows ? `
                    <div class="relay-section">
                        <h4>代表模型定价（部分示例）</h4>
                        <table class="models-mini-table">
                            <thead>
                                <tr>
                                    <th>模型</th>
                                    <th>输入 / 1M tokens</th>
                                    <th>输出 / 1M tokens</th>
                                    <th>备注</th>
                                </tr>
                            </thead>
                            <tbody>${modelsRows}</tbody>
                        </table>
                    </div>
                ` : '';

                const notesSection = detail.notes ? `
                    <div class="relay-section relay-section-notes">
                        <h4>注意事项</h4>
                        <p>${escapeHtml(detail.notes)}</p>
                    </div>
                ` : '';

                return `
                    <div class="relay-card" id="relay-${escapeHtml(relay.id)}">
                        <div class="relay-card-header">
                            <div class="relay-card-title">
                                <span class="relay-name-lg">${escapeHtml(relay.name)}</span>
                                ${ratingStars ? `<span class="relay-star-inline">${ratingStars}</span>` : ''}
                                <span class="type-badge-lg">${escapeHtml(relay.type)}</span>
                            </div>
                            <div class="relay-card-meta">
                                ${relay.homeUrl ? `<a href="${escapeHtml(relay.homeUrl)}" target="_blank" class="home-link">官网 →</a>` : ''}
                                <a href="${escapeHtml(relay.pricingUrl)}" target="_blank" class="pricing-link">查看定价 →</a>
                                <span class="updated-at">数据更新：${escapeHtml(relay.updatedAt)}</span>
                            </div>
                        </div>
                        <div class="relay-card-body">
                            ${detail.description ? `
                                <div class="relay-section">
                                    <h4>产品简介</h4>
                                    <p>${escapeHtml(detail.description)}</p>
                                </div>
                            ` : ''}
                            ${detail.billingRules ? `
                                <div class="relay-section">
                                    <h4>计费规则</h4>
                                    <p>${escapeHtml(detail.billingRules)}</p>
                                </div>
                            ` : ''}
                            ${detail.networkAndPayment ? `
                                <div class="relay-section">
                                    <h4>网络与支付</h4>
                                    <p>${escapeHtml(detail.networkAndPayment)}</p>
                                </div>
                            ` : ''}
                            ${modelsSection}
                            ${notesSection}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ── 渲染底部说明 ──
        function renderNotes(notes) {
            if (!notes || !notes.length) return;
            document.getElementById('notesSection').innerHTML = `
                <h3>说明</h3>
                <ul>${notes.map(n => `<li>${escapeHtml(n)}</li>`).join('')}</ul>
            `;
        }

        // ── 渲染更新日志 ──
        function renderUpdates(updates) {
            if (!updates || !updates.length) return;
            const items = updates.map(u => `
                <li class="update-item">
                    <div class="log-date">${escapeHtml(u.date)}</div>
                    <ul class="update-items">
                        ${u.items.map(i => `<li>${escapeHtml(i)}</li>`).join('')}
                    </ul>
                </li>
            `).join('');
            document.getElementById('updatesSection').innerHTML = `
                <h3>更新日志</h3>
                <ul class="updates-list">${items}</ul>
            `;
        }

        // ── 应用配置 ──
        function applyConfig(config) {
            if (config.header) {
                const h = config.header;
                document.title = `${h.title} 对比`;
                document.getElementById('pageTitle').textContent = h.title;
                document.getElementById('updateDate').textContent = h.updateDate;
                document.getElementById('subtitle').textContent = h.subtitle;
                if (h.github) {
                    document.getElementById('githubLink').href = h.github.url;
                    document.getElementById('githubText').textContent = h.github.text;
                }
            }
            renderNotes(config.notes);
            renderUpdates(config.updates);
        }

        // ── 加载配置 ──
        async function loadConfig() {
            try {
                const res = await fetch(CONFIG_FILE_PATH, { cache: 'no-store' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                pageConfig = await res.json();
                applyConfig(pageConfig);
            } catch (e) {
                console.error('加载配置失败:', e);
            }
        }

        // ── 加载数据 ──
        async function loadRelays() {
            try {
                const res = await fetch(RELAYS_FILE_PATH, { cache: 'no-store' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                relaysData = await res.json();

                const dimensions = (pageConfig.matrixDimensions) || [];
                renderMatrix(relaysData, dimensions);
                renderRelayCards(relaysData);

                console.log(`成功加载 ${relaysData.length} 个中转站数据`);
            } catch (e) {
                console.error('加载数据失败:', e);
                document.getElementById('matrixWrapper').innerHTML =
                    '<div class="loading-state">数据加载失败，请检查 relays.json 文件</div>';
                document.getElementById('relayCards').innerHTML =
                    '<div class="loading-state">数据加载失败，请检查 relays.json 文件</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadConfig();
            await loadRelays();
        });

    </script>
    <script src="scripts/shared.js"></script>
</body>
</html>
