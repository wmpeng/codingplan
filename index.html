<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Plan 对比工具 - 国内厂商套餐对比</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f1f5f9;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            --border-color: #e2e8f0;
            --border-light: #f1f5f9;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-error: #ef4444;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 32px 24px;
            font-size: 14px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 32px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .notice-banner {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(139, 92, 246, 0.08));
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: var(--accent-primary);
            padding: 12px 20px;
            border-radius: var(--radius-lg);
            font-size: 13px;
            margin-bottom: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        .notice-banner .icon {
            font-size: 16px;
        }

        /* 顶部筛选栏 */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }

        .filter-dropdown {
            position: relative;
        }

        .filter-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 10px 16px;
            border-radius: var(--radius-lg);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            font-weight: 500;
            box-shadow: var(--shadow-sm);
        }

        .filter-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent-primary);
            color: var(--text-primary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .filter-btn .arrow {
            font-size: 10px;
            transition: transform 0.2s;
            opacity: 0.6;
        }

        .filter-btn.active .arrow {
            transform: rotate(180deg);
        }

        .filter-btn .count {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            min-width: 20px;
            text-align: center;
            font-weight: 600;
            box-shadow: 0 2px 4px rgba(99, 102, 241, 0.3);
        }

        /* 下拉菜单 */
        .dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 16px;
            min-width: 280px;
            max-width: 360px;
            box-shadow: var(--shadow-xl);
            z-index: 1000;
            display: none;
            animation: dropdownFade 0.2s ease-out;
        }

        @keyframes dropdownFade {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-section {
            margin-bottom: 16px;
        }

        .dropdown-section:last-child {
            margin-bottom: 0;
        }

        .dropdown-title {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 240px;
            overflow-y: auto;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: var(--radius-md);
            transition: all 0.15s ease;
        }

        .checkbox-item:hover {
            background: var(--bg-tertiary);
        }

        .checkbox-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border-color);
            border-radius: 5px;
            background: white;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .checkbox-item input[type="checkbox"]:checked {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-color: transparent;
        }

        .checkbox-item input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: translate(-50%, -60%) rotate(45deg);
        }

        .checkbox-item label {
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
            flex: 1;
            font-weight: 500;
        }

        .price-inputs {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .price-input {
            width: 100%;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: var(--radius-md);
            font-size: 13px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .price-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .price-separator {
            color: var(--text-tertiary);
            font-size: 13px;
            font-weight: 500;
        }

        .dropdown-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
        }

        .dropdown-btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .dropdown-btn.primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .dropdown-btn.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        .dropdown-btn.secondary {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .dropdown-btn.secondary:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        /* 重置按钮 */
        .reset-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: var(--radius-lg);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            box-shadow: var(--shadow-sm);
        }

        .reset-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-color: var(--text-tertiary);
            transform: translateY(-1px);
        }

        /* 统计信息 */
        .stats-bar {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
        }

        .stats-bar strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* 表格容器 */
        .table-wrapper {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
        }

        .table-scroll {
            overflow-x: auto;
            overflow-y: visible;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 1200px;
        }

        thead {
            background: linear-gradient(135deg, #fafbfc, #f8fafc);
        }

        th {
            padding: 16px 18px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
            border-bottom: 2px solid var(--border-light);
            position: relative;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        th:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        th.sortable::after {
            content: '';
            display: inline-block;
            width: 0;
            height: 0;
            margin-left: 8px;
            vertical-align: middle;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 4px solid var(--text-tertiary);
            opacity: 0.4;
            transition: all 0.2s;
        }

        th.sort-asc::after {
            border-top: none;
            border-bottom: 4px solid var(--accent-primary);
            opacity: 1;
        }

        th.sort-desc::after {
            border-top: 4px solid var(--accent-primary);
            border-bottom: none;
            opacity: 1;
        }

        /* 冻结列样式 */
        th.sticky-first,
        th.sticky-second {
            position: sticky;
            z-index: 20;
            background: linear-gradient(135deg, #fafbfc, #f8fafc);
        }

        th.sticky-first {
            left: 0;
            border-right: 2px solid var(--border-color);
        }

        th.sticky-second {
            left: 0;
            border-right: 2px solid var(--border-color);
        }

        td {
            padding: 16px 18px;
            border-bottom: 1px solid var(--border-light);
            font-size: 13px;
            white-space: nowrap;
            color: var(--text-primary);
            position: relative;
            transition: background 0.15s ease;
        }

        tbody tr {
            transition: all 0.15s ease;
        }

        tbody tr:hover {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.02), rgba(139, 92, 246, 0.02));
        }

        tbody tr:hover td {
            color: var(--text-primary);
        }

        /* 冻结列的 td */
        td.sticky-first,
        td.sticky-second {
            position: sticky;
            z-index: 5;
            background: var(--bg-secondary);
        }

        td.sticky-first {
            left: 0;
            border-right: 2px solid var(--border-color);
        }

        td.sticky-second {
            left: 0;
            border-right: 2px solid var(--border-color);
        }

        tbody tr:hover td.sticky-first,
        tbody tr:hover td.sticky-second {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.02), rgba(139, 92, 246, 0.02));
        }

        /* 厂商名称 */
        .vendor-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        /* 套餐名称 */
        .plan-name {
            font-weight: 600;
            color: var(--accent-primary);
            font-size: 14px;
        }

        /* 价格 */
        .price {
            color: var(--accent-primary);
            font-weight: 600;
            font-size: 15px;
        }

        /* 跳转按钮 */
        .action-btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
        }

        /* 模型标签 */
        .model-tag {
            display: inline-block;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(139, 92, 246, 0.08));
            color: var(--accent-primary);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            margin-right: 6px;
            margin-bottom: 6px;
            font-weight: 600;
            border: 1px solid rgba(99, 102, 241, 0.15);
        }

        /* 请求数 */
        .request-count {
            color: var(--accent-success);
            font-weight: 600;
            font-size: 14px;
        }

        /* 其他权益 */
        .benefit {
            display: inline-block;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.08), rgba(251, 191, 36, 0.08));
            color: var(--accent-warning);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            margin-right: 6px;
            margin-bottom: 6px;
            font-weight: 600;
            border: 1px solid rgba(245, 158, 11, 0.15);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-tertiary);
            font-size: 14px;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state-text {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .empty-state-hint {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        /* 底部免责声明 */
        .disclaimer {
            text-align: center;
            margin-top: 32px;
            padding: 20px;
            color: var(--text-tertiary);
            font-size: 12px;
            border-top: 1px solid var(--border-color);
        }

        /* 滚动条美化 */
        .table-scroll::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }

        .table-scroll::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        .table-scroll::-webkit-scrollbar-thumb {
            background: var(--text-tertiary);
            border-radius: 4px;
            opacity: 0.6;
        }

        .table-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
            opacity: 0.8;
        }

        .checkbox-group::-webkit-scrollbar {
            width: 6px;
        }

        .checkbox-group::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        .checkbox-group::-webkit-scrollbar-thumb {
            background: var(--text-tertiary);
            border-radius: 3px;
            opacity: 0.6;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 80px 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            body {
                padding: 20px 16px;
            }

            .header h1 {
                font-size: 22px;
            }

            .header .subtitle {
                font-size: 13px;
            }

            .filter-bar {
                gap: 8px;
            }

            .filter-btn {
                padding: 8px 12px;
                font-size: 12px;
            }

            .dropdown-menu {
                min-width: 240px;
                max-width: calc(100vw - 60px);
            }

            th, td {
                padding: 12px 14px;
                font-size: 12px;
            }

            .action-btn {
                padding: 6px 14px;
                font-size: 11px;
            }

            .table-wrapper {
                border-radius: var(--radius-lg);
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 16px 12px;
            }

            .header h1 {
                font-size: 18px;
            }

            .filter-btn {
                padding: 7px 10px;
                font-size: 11px;
            }

            th, td {
                padding: 10px 12px;
                font-size: 11px;
            }

            .model-tag, .benefit {
                font-size: 10px;
                padding: 3px 8px;
            }

            .price {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部标题 -->
        <div class="header">
            <h1>Coding Plan 对比工具</h1>
            <div class="subtitle">国内主流 AI 厂商套餐对比</div>
            <div class="notice-banner">
                <span class="icon">✨</span>
                通过本站专属链接开通，享额外折扣优惠
            </div>
        </div>

        <!-- 顶部筛选栏 -->
        <div class="filter-bar">
            <!-- 厂商筛选下拉 -->
            <div class="filter-dropdown">
                <button class="filter-btn" id="vendorBtn">
                    <span>厂商</span>
                    <span class="arrow">▼</span>
                    <span class="count" id="vendorCount" style="display: none;">0</span>
                </button>
                <div class="dropdown-menu" id="vendorDropdown">
                    <div class="dropdown-section">
                        <div class="checkbox-group" id="vendorCheckboxes">
                            <!-- 动态填充 -->
                        </div>
                    </div>
                    <div class="dropdown-actions">
                        <button class="dropdown-btn secondary" onclick="resetVendorFilter()">重置</button>
                        <button class="dropdown-btn primary" onclick="closeAllDropdowns()">确定</button>
                    </div>
                </div>
            </div>

            <!-- 价格筛选下拉 -->
            <div class="filter-dropdown">
                <button class="filter-btn" id="priceBtn">
                    <span>首月价格</span>
                    <span class="arrow">▼</span>
                    <span class="count" id="priceCount" style="display: none;">●</span>
                </button>
                <div class="dropdown-menu" id="priceDropdown">
                    <div class="dropdown-section">
                        <div class="dropdown-title">价格区间 (元)</div>
                        <div class="price-inputs">
                            <input type="number" id="priceMin" class="price-input" placeholder="最低" min="0" step="0.1">
                            <span class="price-separator">—</span>
                            <input type="number" id="priceMax" class="price-input" placeholder="最高" min="0" step="0.1">
                        </div>
                    </div>
                    <div class="dropdown-actions">
                        <button class="dropdown-btn secondary" onclick="resetPriceFilter()">重置</button>
                        <button class="dropdown-btn primary" onclick="applyPriceFilter()">确定</button>
                    </div>
                </div>
            </div>

            <!-- 模型筛选下拉 -->
            <div class="filter-dropdown">
                <button class="filter-btn" id="modelBtn">
                    <span>模型</span>
                    <span class="arrow">▼</span>
                    <span class="count" id="modelCount" style="display: none;">0</span>
                </button>
                <div class="dropdown-menu" id="modelDropdown">
                    <div class="dropdown-section">
                        <div class="checkbox-group" id="modelCheckboxes">
                            <!-- 动态填充 -->
                        </div>
                    </div>
                    <div class="dropdown-actions">
                        <button class="dropdown-btn secondary" onclick="resetModelFilter()">重置</button>
                        <button class="dropdown-btn primary" onclick="closeAllDropdowns()">确定</button>
                    </div>
                </div>
            </div>

            <!-- 重置按钮 -->
            <button class="reset-btn" onclick="resetAllFilters()">重置全部</button>
        </div>

        <!-- 统计信息 -->
        <div class="stats-bar">
            <span>显示 <strong id="showingCount">0</strong> / <strong id="totalCount">0</strong> 个套餐</span>
        </div>

        <!-- 表格 -->
        <div class="table-wrapper">
            <div class="table-scroll" id="tableScroll">
                <table id="plansTable">
                    <thead>
                        <tr>
                            <th class="sortable sticky-first" data-column="vendor">厂商</th>
                            <th class="sortable sticky-second" data-column="plan">套餐</th>
                            <th class="sortable" data-column="action">操作</th>
                            <th class="sortable" data-column="firstMonthPrice">首月价格</th>
                            <th class="sortable" data-column="monthlyPrice">连续包月</th>
                            <th class="sortable" data-column="quarterlyPrice">连续包季</th>
                            <th class="sortable" data-column="yearlyPrice">连续包年</th>
                            <th class="sortable" data-column="models">支持模型</th>
                            <th class="sortable" data-column="hourlyRequests">5小时请求数</th>
                            <th class="sortable" data-column="monthlyRequests">每月总请求数</th>
                            <th class="sortable" data-column="benefits">其他权益</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 动态填充 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 底部免责声明 -->
        <div class="disclaimer">
            ⚠️ 本页面数据仅供参考，价格及权益最终以厂商官方公布为准
        </div>
    </div>

    <script>
        // CSV 文件路径
        const CSV_FILE_PATH = './coding-plans.csv';

        // 全局数据
        let allPlans = [];
        let filteredPlans = [];
        let currentSort = { column: null, direction: 'asc' };
        let selectedVendors = new Set();
        let selectedModels = new Set();
        let activeDropdown = null;

        // DOM 元素
        const vendorBtn = document.getElementById('vendorBtn');
        const priceBtn = document.getElementById('priceBtn');
        const modelBtn = document.getElementById('modelBtn');
        const vendorDropdown = document.getElementById('vendorDropdown');
        const priceDropdown = document.getElementById('priceDropdown');
        const modelDropdown = document.getElementById('modelDropdown');
        const vendorCheckboxes = document.getElementById('vendorCheckboxes');
        const modelCheckboxes = document.getElementById('modelCheckboxes');
        const priceMin = document.getElementById('priceMin');
        const priceMax = document.getElementById('priceMax');
        const vendorCount = document.getElementById('vendorCount');
        const modelCount = document.getElementById('modelCount');
        const priceCount = document.getElementById('priceCount');
        const tableBody = document.getElementById('tableBody');
        const showingCount = document.getElementById('showingCount');
        const totalCount = document.getElementById('totalCount');
        const tableScroll = document.getElementById('tableScroll');

        // 解析 CSV 文件
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                if (values.length === headers.length) {
                    const plan = {};
                    headers.forEach((header, index) => {
                        plan[header] = values[index].trim().replace(/^"|"$/g, '');
                    });

                    plan.firstMonthPrice = parseFloat(plan['首月价格']) || 0;
                    plan.monthlyPrice = parseFloat(plan['连续包月']) || 0;
                    plan.quarterlyPrice = parseFloat(plan['连续包季']) || 0;
                    plan.yearlyPrice = parseFloat(plan['连续包年']) || 0;
                    plan.hourlyRequests = parseInt(plan['5小时请求数']) || 0;
                    plan.monthlyRequests = parseInt(plan['每月总请求数']) || 0;

                    plan.models = plan['支持模型'].split(',').map(m => m.trim()).filter(m => m);
                    plan.benefits = plan['其他权益'].split(',').map(b => b.trim()).filter(b => b);

                    data.push(plan);
                }
            }

            return data;
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        }

        // 初始化筛选器
        function initFilters() {
            const vendors = [...new Set(allPlans.map(p => p['厂商名称']))].sort();
            vendors.forEach(vendor => {
                const div = document.createElement('div');
                div.className = 'checkbox-item';
                div.innerHTML = `
                    <input type="checkbox" id="vendor_${vendor}" value="${vendor}" onchange="updateVendorSelection()">
                    <label for="vendor_${vendor}">${vendor}</label>
                `;
                vendorCheckboxes.appendChild(div);
            });

            const models = [...new Set(allPlans.flatMap(p => p.models))].sort();
            models.forEach(model => {
                const div = document.createElement('div');
                div.className = 'checkbox-item';
                div.innerHTML = `
                    <input type="checkbox" id="model_${model}" value="${model}" onchange="updateModelSelection()">
                    <label for="model_${model}">${model}</label>
                `;
                modelCheckboxes.appendChild(div);
            });
        }

        // 下拉菜单控制
        function toggleDropdown(btn, dropdown) {
            if (activeDropdown && activeDropdown !== dropdown) {
                activeDropdown.classList.remove('show');
                const prevBtn = activeDropdown.previousElementSibling;
                prevBtn.classList.remove('active');
            }

            const isOpen = dropdown.classList.contains('show');
            closeAllDropdowns();

            if (!isOpen) {
                dropdown.classList.add('show');
                btn.classList.add('active');
                activeDropdown = dropdown;
            }
        }

        function closeAllDropdowns() {
            document.querySelectorAll('.dropdown-menu').forEach(d => d.classList.remove('show'));
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            activeDropdown = null;
        }

        vendorBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleDropdown(vendorBtn, vendorDropdown);
        });

        priceBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleDropdown(priceBtn, priceDropdown);
        });

        modelBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleDropdown(modelBtn, modelDropdown);
        });

        document.addEventListener('click', () => {
            closeAllDropdowns();
        });

        document.querySelectorAll('.dropdown-menu').forEach(d => {
            d.addEventListener('click', (e) => {
                e.stopPropagation();
            });
        });

        // 更新选择
        function updateVendorSelection() {
            selectedVendors.clear();
            document.querySelectorAll('#vendorCheckboxes input:checked').forEach(cb => {
                selectedVendors.add(cb.value);
            });

            updateVendorCount();
            applyFilters();
        }

        function updateModelSelection() {
            selectedModels.clear();
            document.querySelectorAll('#modelCheckboxes input:checked').forEach(cb => {
                selectedModels.add(cb.value);
            });

            updateModelCount();
            applyFilters();
        }

        function updateVendorCount() {
            if (selectedVendors.size > 0) {
                vendorCount.textContent = selectedVendors.size;
                vendorCount.style.display = 'inline-block';
                vendorBtn.classList.add('active');
            } else {
                vendorCount.style.display = 'none';
                vendorBtn.classList.remove('active');
            }
        }

        function updateModelCount() {
            if (selectedModels.size > 0) {
                modelCount.textContent = selectedModels.size;
                modelCount.style.display = 'inline-block';
                modelBtn.classList.add('active');
            } else {
                modelCount.style.display = 'none';
                modelBtn.classList.remove('active');
            }
        }

        function updatePriceCount() {
            if (priceMin.value || priceMax.value) {
                priceCount.style.display = 'inline-block';
                priceBtn.classList.add('active');
            } else {
                priceCount.style.display = 'none';
                priceBtn.classList.remove('active');
            }
        }

        // 应用筛选
        function applyFilters() {
            const minPrice = parseFloat(priceMin.value) || 0;
            const maxPrice = parseFloat(priceMax.value) || Infinity;

            filteredPlans = allPlans.filter(plan => {
                if (selectedVendors.size > 0 && !selectedVendors.has(plan['厂商名称'])) {
                    return false;
                }

                if (plan.firstMonthPrice < minPrice || plan.firstMonthPrice > maxPrice) {
                    return false;
                }

                if (selectedModels.size > 0) {
                    const hasModel = selectedModels.some(model => plan.models.includes(model));
                    if (!hasModel) return false;
                }

                return true;
            });

            showingCount.textContent = filteredPlans.length;
            totalCount.textContent = allPlans.length;

            if (currentSort.column) {
                sortData(currentSort.column, currentSort.direction);
            } else {
                renderTable();
            }
        }

        function applyPriceFilter() {
            updatePriceCount();
            applyFilters();
            closeAllDropdowns();
        }

        // 重置筛选
        function resetVendorFilter() {
            selectedVendors.clear();
            document.querySelectorAll('#vendorCheckboxes input').forEach(cb => cb.checked = false);
            updateVendorCount();
            applyFilters();
        }

        function resetModelFilter() {
            selectedModels.clear();
            document.querySelectorAll('#modelCheckboxes input').forEach(cb => cb.checked = false);
            updateModelCount();
            applyFilters();
        }

        function resetPriceFilter() {
            priceMin.value = '';
            priceMax.value = '';
            updatePriceCount();
            applyFilters();
        }

        function resetAllFilters() {
            resetVendorFilter();
            resetModelFilter();
            resetPriceFilter();
            currentSort = { column: null, direction: 'asc' };
            document.querySelectorAll('th').forEach(th => {
                th.classList.remove('sort-asc', 'sort-desc');
            });
            applyFilters();
        }

        // 排序数据
        function sortData(column, direction = 'asc') {
            currentSort = { column, direction };

            filteredPlans.sort((a, b) => {
                let valueA, valueB;

                switch (column) {
                    case 'vendor':
                        valueA = a['厂商名称'];
                        valueB = b['厂商名称'];
                        break;
                    case 'plan':
                        valueA = a['套餐名称'];
                        valueB = b['套餐名称'];
                        break;
                    case 'action':
                        valueA = a['套餐名称'];
                        valueB = b['套餐名称'];
                        break;
                    case 'firstMonthPrice':
                        valueA = a.firstMonthPrice;
                        valueB = b.firstMonthPrice;
                        break;
                    case 'monthlyPrice':
                        valueA = a.monthlyPrice;
                        valueB = b.monthlyPrice;
                        break;
                    case 'quarterlyPrice':
                        valueA = a.quarterlyPrice;
                        valueB = b.quarterlyPrice;
                        break;
                    case 'yearlyPrice':
                        valueA = a.yearlyPrice;
                        valueB = b.yearlyPrice;
                        break;
                    case 'models':
                        valueA = a['支持模型'];
                        valueB = b['支持模型'];
                        break;
                    case 'hourlyRequests':
                        valueA = a.hourlyRequests;
                        valueB = b.hourlyRequests;
                        break;
                    case 'monthlyRequests':
                        valueA = a.monthlyRequests;
                        valueB = b.monthlyRequests;
                        break;
                    case 'benefits':
                        valueA = a['其他权益'];
                        valueB = b['其他权益'];
                        break;
                    default:
                        return 0;
                }

                if (typeof valueA === 'number') {
                    return direction === 'asc' ? valueA - valueB : valueB - valueA;
                } else {
                    return direction === 'asc'
                        ? valueA.localeCompare(valueB, 'zh-CN')
                        : valueB.localeCompare(valueA, 'zh-CN');
                }
            });

            renderTable();
            updateSortHeaders();
        }

        function updateSortHeaders() {
            document.querySelectorAll('th').forEach(th => {
                th.classList.remove('sort-asc', 'sort-desc');
                if (th.dataset.column === currentSort.column) {
                    th.classList.add(`sort-${currentSort.direction}`);
                }
            });
        }

        // 动态设置冻结列的 left 值
        function updateStickyColumns() {
            const firstCells = document.querySelectorAll('td.sticky-first, th.sticky-first');
            const secondCells = document.querySelectorAll('td.sticky-second, th.sticky-second');

            let firstWidth = 0;
            firstCells.forEach(cell => {
                firstWidth = Math.max(firstWidth, cell.offsetWidth);
                cell.style.left = '0px';
            });

            secondCells.forEach(cell => {
                cell.style.left = firstWidth + 'px';
            });
        }

        // 渲染表格
        function renderTable() {
            if (filteredPlans.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="11">
                            <div class="empty-state">
                                <div class="empty-state-icon">📭</div>
                                <div class="empty-state-text">没有找到符合条件的套餐</div>
                                <div class="empty-state-hint">请调整筛选条件或重置筛选</div>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tableBody.innerHTML = filteredPlans.map(plan => `
                <tr>
                    <td class="sticky-first"><span class="vendor-name">${escapeHtml(plan['厂商名称'])}</span></td>
                    <td class="sticky-second"><span class="plan-name">${escapeHtml(plan['套餐名称'])}</span></td>
                    <td>
                        <a href="${escapeHtml(plan['跳转链接'])}" target="_blank" class="action-btn">
                            专属折扣开通
                        </a>
                    </td>
                    <td><span class="price">¥${plan.firstMonthPrice.toFixed(1)}</span></td>
                    <td><span class="price">¥${plan.monthlyPrice.toFixed(1)}</span></td>
                    <td><span class="price">¥${plan.quarterlyPrice.toFixed(1)}</span></td>
                    <td><span class="price">¥${plan.yearlyPrice.toFixed(1)}</span></td>
                    <td>
                        ${plan.models.map(model => `<span class="model-tag">${escapeHtml(model)}</span>`).join('')}
                    </td>
                    <td><span class="request-count">${plan.hourlyRequests.toLocaleString()}</span></td>
                    <td><span class="request-count">${plan.monthlyRequests.toLocaleString()}</span></td>
                    <td>
                        ${plan.benefits.map(benefit => `<span class="benefit">${escapeHtml(benefit)}</span>`).join('')}
                    </td>
                </tr>
            `).join('');

            setTimeout(updateStickyColumns, 0);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 表头排序点击
        document.querySelectorAll('th.sortable').forEach(th => {
            th.addEventListener('click', () => {
                const column = th.dataset.column;
                let direction = 'asc';

                if (currentSort.column === column) {
                    direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
                }

                sortData(column, direction);
            });
        });

        window.addEventListener('resize', updateStickyColumns);

        tableScroll.addEventListener('scroll', () => {
            requestAnimationFrame(updateStickyColumns);
        });

        // 加载 CSV 数据
        async function loadData() {
            try {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="11">
                            <div class="loading">加载数据中</div>
                        </td>
                    </tr>
                `;

                const response = await fetch(CSV_FILE_PATH);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const csvText = await response.text();
                allPlans = parseCSV(csvText);
                filteredPlans = [...allPlans];

                initFilters();
                applyFilters();

                console.log(`成功加载 ${allPlans.length} 条套餐数据`);
            } catch (error) {
                console.error('加载数据失败:', error);
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="11">
                            <div class="empty-state">
                                <div class="empty-state-icon">❌</div>
                                <div class="empty-state-text">数据加载失败</div>
                                <div class="empty-state-hint">请检查 CSV 文件路径: ${CSV_FILE_PATH}</div>
                            </div>
                        </td>
                    </tr>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
